// 이미지 확장자 판별
const isImage = name => /\.(jpe?g|png|gif|webp|bmp|svg)$/i.test(name);

// File → { name, dataUrl, type } 변환 (비동기)
const fileToAttachment = file => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = e => resolve({ name: file.name, dataUrl: e.target.result, type: file.type });
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const AttachBtn = ({ files, onFiles, onImageInsert }) => {
  const fileRef  = useRef(null);
  const imageRef = useRef(null);

  const handleChange = async (e, imageOnly = false) => {
    const picked = Array.from(e.target.files || []);
    if (!picked.length) return;
    const converted = await Promise.all(
      picked.map(f => fileToAttachment(f))
    );
    onFiles(prev => {
      const names = new Set(prev.map(a => a.name));
      const added = converted.filter(a => !names.has(a.name));
      return [...prev, ...added];
    });
    if (imageOnly && onImageInsert) {
      converted.forEach(a => { if (isImage(a.name)) onImageInsert(a); });
    }
    e.target.value = '';
  };

  const removeFile = (name, ev) => {
    ev.stopPropagation();
    onFiles(prev => prev.filter(a => a.name !== name));
  };

  const imgs   = files.filter(a => isImage(a.name));
  const others = files.filter(a => !isImage(a.name));

  return (
    <div className="flex flex-col gap-2">
      <input ref={fileRef}  type="file" multiple           className="hidden" onChange={e => handleChange(e, false)} />
      <input ref={imageRef} type="file" multiple accept="image/*" className="hidden" onChange={e => handleChange(e, true)} />
      <div className="flex gap-2">
        <button
          type="button"
          onClick={e => { e.stopPropagation(); fileRef.current?.click(); }}
          className="flex items-center gap-1 text-xs text-gray-400 hover:text-indigo-500"
        >
          <Paperclip size={13} /><span>파일첨부</span>
        </button>
        <button
          type="button"
          onClick={e => { e.stopPropagation(); imageRef.current?.click(); }}
          className="flex items-center gap-1 text-xs text-gray-400 hover:text-indigo-500"
        >
          <Eye size={13} /><span>사진첨부</span>
        </button>
      </div>
      {imgs.length > 0 && (
        <div className="flex flex-wrap gap-2">
          {imgs.map(a => (
            <div key={a.name} className="relative group">
              <img src={a.dataUrl} alt={a.name} className="w-20 h-20 object-cover rounded-xl border border-gray-200" />
              <button
                type="button"
                onClick={ev => removeFile(a.name, ev)}
                className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full text-[10px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
              >×</button>
              <p className="text-[9px] text-gray-400 truncate w-20 mt-0.5">{a.name}</p>
            </div>
          ))}
        </div>
      )}
      {others.length > 0 && (
        <div className="flex flex-wrap gap-1">
          {others.map(a => (
            <span key={a.name} className="flex items-center gap-1 text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">
              <Paperclip size={9} />{a.name}
              <button type="button" onClick={ev => removeFile(a.name, ev)} className="text-gray-400 hover:text-red-400 ml-0.5">×</button>
            </span>
          ))}
        </div>
      )}
    </div>
  );
};

// ── 본문 렌더러: [[파일명]] 마커를 인라인 이미지/링크로 치환 ──
const renderContent = (text, attachments, onLightbox) => {
  if (!text) return null;
  const fileMap = {};
  (attachments || []).forEach(e => {
    const name = e?.name ?? e?.file?.name;
    if (name) fileMap[name] = e;
  });
  const getDataUrl = entry => entry?.dataUrl ?? entry?.url ?? null;
  const parts = text.split(/(\[\[[^\]]+\]\])/g);
  return (
    <div className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">
      {parts.map((part, i) => {
        const m = part.match(/^\[\[(.+)\]\]$/);
        if (!m) return <span key={i}>{part}</span>;
        const name = m[1];
        const entry = fileMap[name];
        if (!entry) return <span key={i} className="text-[10px] text-gray-400 italic">[{name}]</span>;
        const dataUrl = getDataUrl(entry);
        if (isImage(name)) {
          return (
            <span key={i} className="block my-2">
              <img
                src={dataUrl} alt={name}
                onClick={() => onLightbox && onLightbox(dataUrl)}
                className="max-w-full rounded-xl border border-gray-200 cursor-zoom-in hover:opacity-90 transition-opacity"
              />
              <span className="block text-[9px] text-gray-400 mt-0.5">{name}</span>
            </span>
          );
        }
        return (
          <a key={i} href={dataUrl} download={name}
            className="inline-flex items-center gap-1 text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-200 px-2 py-0.5 rounded-full hover:bg-indigo-100 mx-0.5">
            <Paperclip size={9} />{name} ↓
          </a>
        );
      })}
    </div>
  );
};

// ── 채점기 ──
// ── 채점기: 케이스 단건 ──
const judgeOneJS = (code, input, expected) => {
  try {
    const logs = [];
    const _console = { log: (...a) => logs.push(a.map(String).join(' ')) };
    // new Function이 CSP로 차단될 경우 eval로 fallback (Artifacts 환경 대응)
    try {
      const fn = new Function('__input', 'console', code);
      fn(input, _console);
    } catch (cspErr) {
      if (cspErr instanceof EvalError || cspErr.message?.includes('unsafe-eval') || cspErr.message?.includes('Content Security Policy')) {
        // eval fallback
        const __input = input; // eslint-disable-line no-unused-vars
        const console = _console; // eslint-disable-line no-unused-vars
        // eslint-disable-next-line no-eval
        eval(code);
      } else {
        throw cspErr;
      }
    }
    const actual = logs.join('\n').trim();
    return { pass: actual === expected.trim(), actual, expected: expected.trim(), error: null };
  } catch (e) {
    return { pass: false, actual: '', expected: expected.trim(), error: e.message };
  }
};
const judgeOnePY = async (py, code, input, expected) => {
  try {
    // .replace()를 템플릿 리터럴 안에서 처리한 뒤 py.runPython()에 전달 (기존 코드는 괄호 위치 오류)
    const setupCode = `import sys, io
__buf = io.StringIO()
__old_out = sys.stdout
__old_in  = sys.stdin
sys.stdout = __buf
sys.stdin  = io.StringIO(${JSON.stringify(input)})`;
    py.runPython(setupCode);
    try { await py.runPythonAsync(code); }
    finally { try { py.runPython(`sys.stdout = __old_out\nsys.stdin = __old_in`); } catch (_) {} }
    const actual = py.runPython(`__buf.getvalue()`).trim();
    return { pass: actual === expected.trim(), actual, expected: expected.trim(), error: null };
  } catch (e) {
    try { py.runPython(`import sys; sys.stdout = __old_out; sys.stdin = __old_in`); } catch (_) {}
    return { pass: false, actual: '', expected: expected.trim(), error: e.message };
  }
};
// 전체 테스트케이스 실행 → [{pass, actual, expected, error}, ...]
const runAllCases = async (lang, code, testCases, onProgress) => {
  let py = null;
  if (lang === 'py') { py = await getPyodide(); }
  const results = [];
  for (let i = 0; i < testCases.length; i++) {
    const { input, output } = testCases[i];
    const r = lang === 'py'
      ? await judgeOnePY(py, code, input, output)
      : judgeOneJS(code, input, output);
    results.push(r);
    if (onProgress) onProgress(i + 1, results);
  }
  return results;
};

// ── 좋아요/싫어요 헬퍼 ──
const applyReaction = (post, prev, next) => {
  let l = post.likes || 0, d = post.dislikes || 0;
  if (prev === 'like') l--;
  if (prev === 'dislike') d--;
  if (next === 'like') l++;
  if (next === 'dislike') d++;
  return { ...post, likes: l, dislikes: d };
};

              </div>
            </div>
          )}
          <div className="flex gap-3 text-xs text-gray-400">
            <span className="flex items-center gap-1"><Eye size={11} />{selected.views}</span>
            <span className="flex items-center gap-1"><Check size={11} />{selected.solvedCount}명 해결</span>
            <NickChip name={selected.author} onViewProfile={onViewProfile} className="flex items-center gap-1 text-xs text-gray-400" size="sm" />
          </div>
        </div>
        <div className="bg-gray-900 rounded-2xl p-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs text-gray-400 font-mono">코드 작성</span>
            <div className="flex gap-1">
              <button type="button" onClick={e => { e.stopPropagation(); handleLangChange('js'); }} className={`text-[10px] font-bold px-2 py-0.5 rounded-full transition-all ${lang === 'js' ? 'bg-yellow-500 text-gray-900' : 'bg-gray-700 text-gray-400'}`}>JS</button>
              <button type="button" onClick={e => { e.stopPropagation(); handleLangChange('py'); }} className={`text-[10px] font-bold px-2 py-0.5 rounded-full transition-all ${lang === 'py' ? 'bg-blue-500 text-white' : 'bg-gray-700 text-gray-400'}`}>Python</button>
            </div>
          </div>
          {lang === 'py' && pyStatus === 'loading' && <p className="text-yellow-400 text-xs mb-2 flex items-center gap-1"><span className="animate-spin inline-block">⏳</span>Python 엔진 로딩 중... (최초 1회, 약 10~20초 소요)</p>}
          {lang === 'py' && pyStatus === 'error'   && <p className="text-red-400 text-xs mb-2">Python 엔진 로드 실패. 네트워크를 확인하세요.</p>}
          {lang === 'py' && pyStatus === 'ready'   && <p className="text-emerald-400 text-xs mb-2">✓ Python 준비 완료</p>}
          <p className="text-[10px] text-gray-500 mb-2">{lang === 'py' ? 'print()로 출력하세요. 예: print(1+2)' : 'console.log()로 출력하세요. 예: console.log(1+2)'}</p>
          <textarea
            className="w-full bg-transparent text-green-300 font-mono text-xs resize-none outline-none min-h-[96px]"
            placeholder={lang === 'py' ? '# Python 코드를 작성하세요\n# 예: print(1 + 2)' : '// JavaScript 코드를 작성하세요\n// 예: console.log(1 + 2)'}
            value={code}
            onChange={e => { e.stopPropagation(); codeRef.current = e.target.value; setCode(e.target.value); }}
            onClick={e => e.stopPropagation()}
            onPointerDown={e => e.stopPropagation()}
            onTouchStart={e => e.stopPropagation()}
          />
          {/* 케이스별 진행 결과 */}
          {(judging || caseResults.length > 0) && (
            <div className="mt-2 flex flex-col gap-1.5">
              <div className="flex gap-0.5 flex-wrap">
                {(selected.testCases || []).map((_, i) => {
                  const r = caseResults[i];
                  const bg = !r ? 'bg-gray-600' : r.error ? 'bg-orange-500' : r.pass ? 'bg-emerald-500' : 'bg-red-500';
                  return (
                    <div key={i} title={`TC ${i+1}${r ? (r.pass ? ' ✓' : r.error ? ' 오류' : ' ✗') : ''}`}
                      className={`w-5 h-5 rounded flex items-center justify-center text-[9px] font-bold text-white transition-colors ${bg}`}>
                      {i+1}
                    </div>
                  );
                })}
              </div>
              {judging && (
                <span className="text-yellow-400 text-xs flex items-center gap-1">
                  <span className="animate-spin inline-block">⏳</span>
                  채점 중... ({caseResults.length}/{(selected.testCases||[]).length})
                </span>
              )}
              {!judging && judgeResult === 'correct' && (
                <span className="text-emerald-400 text-xs font-bold flex items-center gap-1">
                  <Check size={12} />전체 통과! 정답입니다 🎉
                </span>
              )}
              {!judging && judgeResult === 'wrong' && judgeDetail && (
                <div className="text-xs space-y-0.5">
                  <span className="text-red-400 font-bold flex items-center gap-1">
                    <X size={12} />오답 — {caseResults.filter(r=>r.pass).length}/{caseResults.length} 통과
                  </span>
                  <p className="text-gray-400">첫 실패 출력: <code className="text-red-300">{judgeDetail.actual || '(없음)'}</code></p>
                  <p className="text-gray-400">정답: <code className="text-emerald-300">{judgeDetail.expected}</code></p>
                </div>
              )}
              {!judging && judgeResult === 'error' && judgeDetail && (
                <span className="text-orange-400 text-xs">오류: {judgeDetail.error}</span>
              )}
            </div>
          )}
          <div className="flex justify-end mt-1">
            <button type="button" onClick={handleJudge} disabled={judging || (lang === 'py' && pyStatus === 'loading')} className="flex items-center gap-1 bg-emerald-500 text-white text-xs px-3 py-1.5 rounded-lg font-bold active:scale-95 disabled:opacity-50">
              <Play size={11} />제출 및 채점
            </button>
          </div>
        </div>
        <div className="flex gap-2">
          <button onClick={() => handleReact(selected.id, 'like')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border text-sm font-bold active:scale-95 transition-all ${myReact === 'like' ? 'bg-emerald-500 text-white border-emerald-500' : 'border-emerald-200 text-emerald-600 bg-emerald-50'}`}><ThumbsUp size={14} />{selected.likes}</button>
          <button onClick={() => handleReact(selected.id, 'dislike')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border text-sm font-bold active:scale-95 transition-all ${myReact === 'dislike' ? 'bg-red-500 text-white border-red-500' : 'border-red-200 text-red-500 bg-red-50'}`}><ThumbsDown size={14} />{selected.dislikes}</button>
        </div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <h4 className="font-bold text-gray-700 text-sm mb-3">댓글 {selected.comments.length}</h4>
          <div className="flex flex-col gap-2 mb-3">
            {selected.comments.map(c => (
              <div key={c.id} className="bg-gray-50 rounded-xl p-3">
                <div className="flex items-center justify-between mb-1">
                  <NickChip name={c.author} onViewProfile={onViewProfile} className="text-xs font-bold text-gray-600" size="sm" />
                  <div className="flex items-center gap-1">
                    <span className="text-[10px] text-gray-400">{formatCommunityTime(c.createdAt || c.time)}</span>
                    {c.author === nickname && editCommentId !== c.id && <>
                      <button onClick={() => { setEditCommentId(c.id); setEditCommentText(c.text); }} className="text-[10px] text-blue-400 hover:text-blue-600 px-1"><Edit2 size={10} /></button>
                      <button type="button" onClick={() => setConfirmComment(c.id)} className="text-[10px] text-red-400 hover:text-red-600 px-1"><Trash2 size={10} /></button>
                    </>}
                  </div>
                </div>
                {editCommentId === c.id ? (
                  <div className="flex gap-2 mt-1">
                    <input className="flex-1 border rounded-lg px-2 py-1 text-xs outline-none focus:border-emerald-400" value={editCommentText} onChange={e => setEditCommentText(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSaveComment(c.id)} />
                    <button onClick={() => handleSaveComment(c.id)} className="text-xs bg-emerald-500 text-white px-2 py-1 rounded-lg">저장</button>
                    <button onClick={() => setEditCommentId(null)} className="text-xs text-gray-400 px-1">취소</button>
                  </div>
                ) : <p className="text-xs text-gray-700">{c.text}</p>}
              </div>
            ))}
            {selected.comments.length === 0 && <p className="text-xs text-gray-400 text-center py-2">첫 댓글을 달아보세요!</p>}
          </div>
          <div className="flex gap-2">
            <input className="flex-1 border rounded-xl px-3 py-2 text-xs outline-none focus:border-emerald-400" placeholder="댓글 작성..." value={newComment} onChange={e => setNewComment(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddComment()} />
            <button onClick={handleAddComment} className="bg-emerald-500 text-white p-2 rounded-xl active:scale-95"><Send size={13} /></button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="flex flex-col gap-3">
      <div className="flex items-center justify-between">
        <h3 className="font-bold text-gray-800">코딩 문제 게시판</h3>
        <button onClick={() => setView('new')} className="flex items-center gap-1 bg-emerald-500 text-white text-xs px-3 py-2 rounded-xl font-bold active:scale-95"><Plus size={12} />출제</button>
      </div>
      <div className="flex gap-2">
        <div className="flex-1 flex items-center gap-2 bg-white border rounded-xl px-3 py-2">
          <Search size={13} className="text-gray-400" />
          <input className="flex-1 text-xs outline-none" placeholder="문제 검색..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <select className="border rounded-xl px-2 py-2 text-xs outline-none bg-white" value={filterDiff} onChange={e => setFilterDiff(e.target.value)}>
          {['전체', '쉬움', '보통', '어려움'].map(d => <option key={d}>{d}</option>)}
        </select>
      </div>
      <div className="flex flex-col gap-2">
        {filtered.map(p => (
          <button key={p.id} onClick={() => openPost(p)} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-left active:scale-[0.98] transition-transform">
            <div className="flex items-start justify-between mb-1">
              <p className="font-bold text-sm text-gray-800 flex-1 pr-2">{p.title}</p>
              <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${DIFF_COLOR[p.difficulty]}`}>{p.difficulty}</span>
            </div>
            <div className="flex gap-1 flex-wrap mb-2">{p.tags.map(t => <Badge key={t} text={`#${t}`} color="bg-gray-100 text-gray-500" />)}</div>
            <div className="flex items-center gap-3 text-[11px] text-gray-400">
              <NickChip name={p.author} onViewProfile={onViewProfile} className="flex items-center gap-0.5 text-[11px] text-gray-400" size="xs" />
              <span className="flex items-center gap-0.5"><ThumbsUp size={10} />{p.likes}</span>
              <span className="flex items-center gap-0.5"><Check size={10} />{p.solvedCount}명 해결</span>
              <span className="flex items-center gap-0.5"><MessageSquare size={10} />{p.comments.length}</span>
              <span className="flex items-center gap-0.5"><Eye size={10} />{p.views}</span>
              {p.author === nickname && <span className="text-indigo-400 font-bold text-[10px]">내 글</span>}
            </div>
          </button>
        ))}
        {filtered.length === 0 && <p className="text-center text-sm text-gray-400 py-8">검색 결과가 없습니다.</p>}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// Q&A 게시판
// ════════════════════════════════════════════════════════
function QnABoard({ nickname, isAdmin = false, qnaPosts, setQnaPosts, userPoints, setUserPoints, ownedItems, setOwnedItems, initPostId, onClearInitPost, myReactions, setMyReactions, boardPrefix, onViewProfile }) {
  const [view, setView] = useState(initPostId ? 'detail' : 'list');
  const [selected, setSelected] = useState(() => initPostId ? qnaPosts.find(p => p.id === initPostId) || null : null);
  const [nTitle, setNTitle] = useState(''); const [nContent, setNContent] = useState(''); const [nTags, setNTags] = useState(''); const [nPoints, setNPoints] = useState(50);
  const [nFiles, setNFiles] = useState([]);
  const [answerText, setAnswerText] = useState('');
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(false);
  const [eTitle, setETitle] = useState(''); const [eContent, setEContent] = useState(''); const [eTags, setETags] = useState('');
  const [editAnswerId, setEditAnswerId] = useState(null); const [editAnswerText, setEditAnswerText] = useState('');
  const [aFiles, setAFiles] = useState([]);
  const nContentRef = useRef(null);
  const [eFiles, setEFiles] = useState([]);
  const eContentRef = useRef(null);
  const [confirmDel, setConfirmDel] = useState(false);
  const [confirmAnswer, setConfirmAnswer] = useState(null);
  const [lightbox, setLightbox] = useState(null);

  const goList = () => { setView('list'); setSelected(null); if (onClearInitPost) onClearInitPost(); };
  const openedInitPostRef = useRef(initPostId || null);
  useEffect(() => {
    if (!initPostId || openedInitPostRef.current === initPostId) return;
    const target = qnaPosts.find(p => String(p.id) === String(initPostId));
    if (!target) return;
    openedInitPostRef.current = initPostId;
    setSelected(target);
    setView('detail');
    setAnswerText('');
  }, [initPostId, qnaPosts]);
  const openPost = p => { setQnaPosts(ps => ps.map(x => x.id === p.id ? { ...x, views: (x.views || 0) + 1 } : x)); setSelected({ ...p, views: (p.views || 0) + 1 }); setView('detail'); setAnswerText(''); };
  const handleReact = (id, type) => {
    const key = `${boardPrefix}_${id}`; const prev = myReactions[key]; const next = prev === type ? undefined : type;
    setMyReactions(r => ({ ...r, [key]: next }));
    setQnaPosts(ps => ps.map(p => p.id === id ? applyReaction(p, prev, next) : p));
    setSelected(s => s && s.id === id ? applyReaction(s, prev, next) : s);
  };
  const handleAdopt = (postId, answerId) => {
    const post = qnaPosts.find(p => p.id === postId);
    if (!post || post.status === 'answered') return;
    const answer = post.answers.find(a => a.id === answerId);
    if (!answer) return;
    const pts = post.points || 0;
    setQnaPosts(ps => ps.map(p => p.id !== postId ? p : { ...p, status: 'answered', answers: p.answers.map(a => a.id === answerId ? { ...a, adopted: true } : a) }));
    setSelected(s => ({ ...s, status: 'answered', answers: s.answers.map(a => a.id === answerId ? { ...a, adopted: true } : a) }));
    // 질문자 포인트 차감은 질문 등록 시 이미 됨.
    // 답변 작성자가 본인이면 자신의 포인트 state에 직접 반영, 아니면 ls에 직접 적립
    if (answer.author === nickname) {
      setUserPoints(pt => pt + pts);
    } else {
      const aKey = `mcu_points_${answer.author}`;
      lsSet(aKey, (lsGet(aKey, 350)) + pts);
    }
  };
  const handleAddAnswer = () => {
    if (!answerText.trim()) return;
    const createdAt = communityNowIso();
    const a = { id: Date.now(), author: nickname, content: answerText, likes: 0, adopted: false, createdAt, time: createdAt };
    setSelected(s => ({ ...s, answers: [...s.answers, a] }));
    setQnaPosts(ps => ps.map(p => p.id === selected.id ? { ...p, answers: [...p.answers, a] } : p));
    createCommunityNotification({ targetNickname: selected.author, actor: nickname, board: 'qna', post: selected, entry: a, kind: 'answer' });
    setAnswerText('');
  };
  const handleSaveAnswer = aid => {
    if (!editAnswerText.trim()) return;
    const upd = as => as.map(a => a.id === aid ? { ...a, content: editAnswerText } : a);
    setSelected(s => ({ ...s, answers: upd(s.answers) }));
    setQnaPosts(ps => ps.map(p => p.id === selected.id ? { ...p, answers: upd(p.answers) } : p));
    setEditAnswerId(null); setEditAnswerText('');
  };
  const handleDeleteAnswer = aid => {
    const upd = as => as.filter(a => a.id !== aid);
    setSelected(s => ({ ...s, answers: upd(s.answers) }));
    setQnaPosts(ps => ps.map(p => p.id === selected.id ? { ...p, answers: upd(p.answers) } : p));
  };
  const handleAnswerLike = aid => {
    const key = `a_${aid}`; const already = myReactions[key]; const next = already ? undefined : 'like';
    setMyReactions(r => ({ ...r, [key]: next }));
    const upd = as => as.map(a => a.id === aid ? { ...a, likes: a.likes + (next ? 1 : -1) } : a);
    setSelected(s => ({ ...s, answers: upd(s.answers) }));
    setQnaPosts(ps => ps.map(p => p.id === selected.id ? { ...p, answers: upd(p.answers) } : p));
  };
  const handlePost = () => {
    if (!nTitle.trim() || !nContent.trim()) return;
    const createdAt = communityNowIso();
    const np = { id: Date.now(), title: nTitle, author: nickname, points: nPoints, status: 'open', views: 0, likes: 0, dislikes: 0, content: nContent, tags: nTags.split(',').map(t => t.trim()).filter(Boolean), answers: [], createdAt, time: createdAt, attachments: nFiles };
    setQnaPosts(ps => [np, ...ps]); setUserPoints(pt => pt - nPoints); setNTitle(''); setNContent(''); setNTags(''); setNPoints(50); setNFiles([]); setView('list');
  };
  const handleDelete = id => { setQnaPosts(ps => ps.filter(p => p.id !== id)); goList(); };
  const startEdit = p => { setETitle(p.title); setEContent(p.content); setETags(p.tags.join(', ')); setEFiles(p.attachments || []); setEditing(true); };
  const handleEdit = () => {
    const upd = { ...selected, title: eTitle, content: eContent, tags: eTags.split(',').map(t => t.trim()).filter(Boolean), attachments: eFiles };
    setQnaPosts(ps => ps.map(p => p.id === selected.id ? upd : p)); setSelected(upd); setEditing(false);
  };
  const insertImgMarker = (imgEntry, setter, ref) => {
    const marker = `[[${imgEntry.name ?? imgEntry.file?.name}]]`;
    const el = ref.current;
    if (!el) { setter(v => v + '\n' + marker); return; }
    const s = el.selectionStart, e = el.selectionEnd;
    setter(v => v.slice(0, s) + '\n' + marker + '\n' + v.slice(e));
    requestAnimationFrame(() => { el.selectionStart = el.selectionEnd = s + marker.length + 2; el.focus(); });
  };

  if (view === 'reward') return (
    <div className="flex flex-col gap-3">
      <BackBtn onBack={() => setView('list')} />
      <div className="bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl p-4 text-white">
        <div className="flex items-center gap-2 mb-1"><Trophy size={18} /><span className="font-black text-lg">내 포인트</span></div>
        <p className="text-3xl font-black">{userPoints.toLocaleString()} P</p>
        <p className="text-xs text-white/80 mt-1">답변 채택 시 포인트가 적립됩니다</p>
      </div>
      <h4 className="font-bold text-gray-700 text-sm">리워드 상점</h4>
      <div className="grid grid-cols-2 gap-2">
        {REWARDS.map(r => (
          <div key={r.id} className="bg-white rounded-2xl p-3 shadow-sm border border-gray-100">
            <div className="text-2xl mb-1">{r.icon}</div>
            <p className="font-bold text-sm text-gray-800">{r.name}</p>
            <p className="text-[10px] text-gray-400 mb-2">{r.desc}</p>
            {ownedItems.includes(r.effect)
              ? <div className="w-full text-xs py-1.5 rounded-xl font-bold text-center bg-gray-100 text-gray-400">보유 중</div>
              : <button onClick={() => { if (userPoints >= r.cost) { setUserPoints(pt => pt - r.cost); setOwnedItems(prev => [...prev, r.effect]); } }} disabled={userPoints < r.cost} className="w-full text-xs py-1.5 rounded-xl font-bold active:scale-95 disabled:opacity-40 bg-amber-500 text-white">{r.cost.toLocaleString()} P 구매</button>
            }
          </div>
        ))}
      </div>
    </div>
  );

  if (view === 'new') return (
    <div className="flex flex-col gap-3">
      <BackBtn onBack={() => setView('list')} />
      <h3 className="font-bold text-gray-800">질문 등록</h3>
      <input className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400" placeholder="질문 제목" value={nTitle} onChange={e => setNTitle(e.target.value)} />
      <textarea ref={nContentRef} className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400 resize-none" rows={5} placeholder="질문 내용" value={nContent} onChange={e => setNContent(e.target.value)} />
      <input className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400" placeholder="태그 (쉼표로 구분)" value={nTags} onChange={e => setNTags(e.target.value)} />
      <div className="bg-amber-50 rounded-xl p-3 border border-amber-200">
        <p className="text-xs font-bold text-amber-700 mb-2 flex items-center gap-1"><Trophy size={12} />채택 포인트 설정</p>
        <div className="flex items-center gap-3">
          <input type="range" min={10} max={Math.min(500, userPoints)} step={10} value={nPoints} onChange={e => setNPoints(Number(e.target.value))} className="flex-1" />
          <span className="text-sm font-black text-amber-600 w-16 text-right">{nPoints} P</span>
        </div>
        <p className="text-[10px] text-amber-500 mt-1">현재 보유: {userPoints} P</p>
      </div>
      <AttachBtn files={nFiles} onFiles={setNFiles} onImageInsert={img => insertImgMarker(img, setNContent, nContentRef)} />
      <button onClick={handlePost} className="bg-blue-500 text-white rounded-xl py-3 text-sm font-bold active:scale-95">질문 등록</button>
    </div>
  );

  if (view === 'detail' && selected) {
    if (editing) return (
      <div className="flex flex-col gap-3">
        <BackBtn onBack={() => setEditing(false)} label="취소" />
        <h3 className="font-bold text-gray-800">질문 수정</h3>
        <input className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400" value={eTitle} onChange={e => setETitle(e.target.value)} />
        <textarea ref={eContentRef} className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400 resize-none" rows={5} value={eContent} onChange={e => setEContent(e.target.value)} />
        <input className="border rounded-xl px-3 py-2 text-sm outline-none" value={eTags} onChange={e => setETags(e.target.value)} />
        <AttachBtn files={eFiles} onFiles={setEFiles} onImageInsert={img => insertImgMarker(img, setEContent, eContentRef)} />
        <button onClick={handleEdit} className="bg-blue-500 text-white rounded-xl py-3 text-sm font-bold active:scale-95">수정 완료</button>
      </div>
    );
    const myReact = myReactions[`${boardPrefix}_${selected.id}`];
    return (
      <div className="flex flex-col gap-3">
        <div className="flex items-center justify-between">
          <BackBtn onBack={goList} />
          {((selected.author === nickname || isAdmin) && selected.status === 'open') || isAdmin ? (
            <div className="flex gap-2 mb-3">
              {(selected.author === nickname || isAdmin) && selected.status === 'open' && (
                <button onClick={() => startEdit(selected)} className="flex items-center gap-1 text-xs text-blue-500 px-2 py-1 rounded-lg border border-blue-200 hover:bg-blue-50"><Edit2 size={11} />수정</button>
              )}
              <button onClick={() => setConfirmDel(true)} className="flex items-center gap-1 text-xs text-red-500 px-2 py-1 rounded-lg border border-red-200 hover:bg-red-50"><Trash2 size={11} />삭제</button>
            </div>
          ) : null}
        </div>
        {confirmDel && <ConfirmDialog msg="정말 삭제하시겠어요?" onOk={() => { setConfirmDel(false); handleDelete(selected.id); }} onCancel={() => setConfirmDel(false)} />}
        {confirmAnswer && <ConfirmDialog msg="답변을 삭제하시겠어요?" onOk={() => { handleDeleteAnswer(confirmAnswer); setConfirmAnswer(null); }} onCancel={() => setConfirmAnswer(null)} />}
        {lightbox && (<div onClick={() => setLightbox(null)} className="fixed inset-0 bg-black/80 flex items-center justify-center z-50"><img src={lightbox} alt="" className="max-w-[90vw] max-h-[90vh] rounded-2xl shadow-2xl" /><button type="button" onClick={() => setLightbox(null)} className="absolute top-4 right-4 text-white text-2xl font-bold w-9 h-9 rounded-full bg-white/20 flex items-center justify-center">×</button></div>)}
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <div className="flex items-start justify-between mb-2">
            <h3 className="font-bold text-gray-800 text-base flex-1 pr-2">{selected.title}</h3>
            <Badge text={selected.status === 'answered' ? '채택완료' : '답변대기'} color={selected.status === 'answered' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'} />
          </div>
          <div className="flex gap-1 flex-wrap mb-3">{selected.tags.map(t => <Badge key={t} text={`#${t}`} color="bg-gray-100 text-gray-500" />)}</div>
          {renderContent(selected.content, selected.attachments, setLightbox)}
          <AttachList files={selected.attachments} />
          <div className="flex gap-3 text-xs text-gray-400">
            <NickChip name={selected.author} onViewProfile={onViewProfile} className="flex items-center gap-1 text-xs text-gray-400" size="xs" />
            <span className="flex items-center gap-1"><Clock size={10} />{formatCommunityTime(selected.createdAt || selected.time)}</span>
            <span className="flex items-center gap-1 text-amber-600 font-bold"><Trophy size={10} />{selected.points} P</span>
            <span className="flex items-center gap-1"><Eye size={10} />{selected.views || 0}</span>
          </div>
        </div>
        <div className="flex gap-2">
          <button onClick={() => handleReact(selected.id, 'like')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border text-sm font-bold active:scale-95 transition-all ${myReact === 'like' ? 'bg-blue-500 text-white border-blue-500' : 'border-blue-200 text-blue-600 bg-blue-50'}`}><ThumbsUp size={14} />{selected.likes || 0}</button>
          <button onClick={() => handleReact(selected.id, 'dislike')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border text-sm font-bold active:scale-95 transition-all ${myReact === 'dislike' ? 'bg-red-500 text-white border-red-500' : 'border-red-200 text-red-500 bg-red-50'}`}><ThumbsDown size={14} />{selected.dislikes || 0}</button>
        </div>
        <h4 className="font-bold text-gray-700 text-sm">답변 {selected.answers.length}개</h4>
        {selected.answers.map(a => (
          <div key={a.id} className={`bg-white rounded-2xl p-4 shadow-sm border ${a.adopted ? 'border-emerald-300 bg-emerald-50' : 'border-gray-100'}`}>
            {a.adopted && <div className="flex items-center gap-1 text-emerald-600 text-xs font-bold mb-2"><Check size={12} />채택된 답변</div>}
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-bold text-gray-700 flex items-center gap-1">{a.adopted && <Crown size={11} className="text-amber-500" />}<NickChip name={a.author} onViewProfile={onViewProfile} className="font-bold" size="xs" /></span>
              <div className="flex items-center gap-1">
                <span className="text-[10px] text-gray-400">{formatCommunityTime(a.createdAt || a.time)}</span>
                {(a.author === nickname || isAdmin) && !a.adopted && editAnswerId !== a.id && <>
                  <button onClick={() => { setEditAnswerId(a.id); setEditAnswerText(a.content); }} className="text-[10px] text-blue-400 hover:text-blue-600 px-1"><Edit2 size={10} /></button>
                  <button type="button" onClick={() => setConfirmAnswer(a.id)} className="text-[10px] text-red-400 hover:text-red-600 px-1"><Trash2 size={10} /></button>
                </>}
              </div>
            </div>
            {editAnswerId === a.id ? (
              <div className="flex flex-col gap-2 mt-1">
                <textarea className="w-full border rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400 resize-none" rows={3} value={editAnswerText} onChange={e => setEditAnswerText(e.target.value)} />
                <div className="flex gap-2 justify-end">
                  <button onClick={() => handleSaveAnswer(a.id)} className="text-xs bg-blue-500 text-white px-3 py-1.5 rounded-lg font-bold">저장</button>
                  <button onClick={() => setEditAnswerId(null)} className="text-xs text-gray-400 px-2">취소</button>
                </div>
              </div>
            ) : <p className="text-sm text-gray-700 leading-relaxed mb-3">{a.content}</p>}
            {!editAnswerId && (
              <div className="flex items-center justify-between">
                <button onClick={() => handleAnswerLike(a.id)} className={`flex items-center gap-1 text-xs px-2.5 py-1 rounded-xl border font-bold active:scale-95 transition-all ${myReactions[`a_${a.id}`] ? 'bg-blue-500 text-white border-blue-500' : 'border-blue-200 text-blue-500 bg-blue-50'}`}><ThumbsUp size={11} />{a.likes}</button>
                {(selected.author === nickname || isAdmin) && !a.adopted && selected.status === 'open' && (
                  <button onClick={() => handleAdopt(selected.id, a.id)} className="flex items-center gap-1 text-xs bg-emerald-500 text-white px-3 py-1.5 rounded-xl font-bold active:scale-95"><Check size={11} />채택하기</button>
                )}
              </div>
            )}
          </div>
        ))}
        {selected.answers.length === 0 && <p className="text-center text-sm text-gray-400 py-4">아직 답변이 없습니다.</p>}
        {selected.status === 'open' && (
          <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
            <h4 className="font-bold text-gray-700 text-sm mb-2">답변 작성</h4>
            <textarea className="w-full border rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-400 resize-none" rows={4} placeholder="도움이 되는 답변을 작성해주세요" value={answerText} onChange={e => setAnswerText(e.target.value)} />
            <div className="flex items-center justify-between mt-2">
              <AttachBtn files={aFiles} onFiles={setAFiles} />
              <button onClick={handleAddAnswer} className="flex items-center gap-1 bg-blue-500 text-white text-xs px-4 py-2 rounded-xl font-bold active:scale-95"><Send size={11} />답변 등록</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="flex flex-col gap-3">
      <div className="flex items-center justify-between">
        <h3 className="font-bold text-gray-800">프로그래밍 Q&A</h3>
        <div className="flex gap-2">
          <button onClick={() => setView('reward')} className="flex items-center gap-1 bg-amber-100 text-amber-600 text-xs px-3 py-2 rounded-xl font-bold active:scale-95"><Trophy size={12} />{userPoints.toLocaleString()}P</button>
          <button onClick={() => setView('new')} className="flex items-center gap-1 bg-blue-500 text-white text-xs px-3 py-2 rounded-xl font-bold active:scale-95"><Plus size={12} />질문</button>
        </div>
      </div>
      <div className="flex items-center gap-2 bg-white border rounded-xl px-3 py-2">
        <Search size={13} className="text-gray-400" />
        <input className="flex-1 text-xs outline-none" placeholder="질문 검색..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      <div className="flex flex-col gap-2">
        {qnaPosts.filter(p => p.title.includes(search)).map(p => (
          <button key={p.id} onClick={() => openPost(p)} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-left active:scale-[0.98] transition-transform">
            <div className="flex items-start justify-between mb-1">
              <p className="font-bold text-sm text-gray-800 flex-1 pr-2 line-clamp-2">{p.title}</p>
              <Badge text={p.status === 'answered' ? '채택완료' : '답변대기'} color={p.status === 'answered' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'} />
            </div>
            <div className="flex gap-1 flex-wrap mb-2">{p.tags.map(t => <Badge key={t} text={`#${t}`} color="bg-gray-100 text-gray-500" />)}</div>
            <div className="flex items-center gap-3 text-[11px] text-gray-400">
              <NickChip name={p.author} onViewProfile={onViewProfile} className="flex items-center gap-0.5 text-[11px] text-gray-400" size="xs" />
              <span className="flex items-center gap-0.5"><MessageSquare size={10} />{p.answers.length}</span>
              <span className="flex items-center gap-0.5"><Eye size={10} />{p.views || 0}</span>
              <span className="flex items-center gap-0.5 text-amber-500 font-bold"><Trophy size={10} />{p.points}P</span>
              {p.author === nickname && <span className="text-indigo-400 font-bold text-[10px]">내 글</span>}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// 자유게시판
// ════════════════════════════════════════════════════════
function FreeBoard({ nickname, isAdmin = false, freePosts, setFreePosts, initPostId, onClearInitPost, myReactions, setMyReactions, boardPrefix, onViewProfile }) {
  const [view, setView] = useState(initPostId ? 'detail' : 'list');
  const [selected, setSelected] = useState(() => initPostId ? freePosts.find(p => p.id === initPostId) || null : null);
  const [nTitle, setNTitle] = useState(''); const [nContent, setNContent] = useState(''); const [isAnon, setIsAnon] = useState(false);
  const [nFiles, setNFiles] = useState([]);
  const nContentRef = useRef(null);
  const [newComment, setNewComment] = useState(''); const [commentAnon, setCommentAnon] = useState(false);
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(false);
  const [eTitle, setETitle] = useState(''); const [eContent, setEContent] = useState('');
  const [eFiles, setEFiles] = useState([]);
  const eContentRef = useRef(null);
  const [confirmDel, setConfirmDel] = useState(false);
  const [confirmComment, setConfirmComment] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [editCommentId, setEditCommentId] = useState(null); const [editCommentText, setEditCommentText] = useState('');

  const goList = () => { setView('list'); setSelected(null); if (onClearInitPost) onClearInitPost(); };
  const openedInitPostRef = useRef(initPostId || null);
  useEffect(() => {
    if (!initPostId || openedInitPostRef.current === initPostId) return;
    const target = freePosts.find(p => String(p.id) === String(initPostId));
    if (!target) return;
    openedInitPostRef.current = initPostId;
    setSelected(target);
    setView('detail');
  }, [initPostId, freePosts]);
  const openPost = p => { setFreePosts(ps => ps.map(x => x.id === p.id ? { ...x, views: (x.views || 0) + 1 } : x)); setSelected({ ...p, views: (p.views || 0) + 1 }); setView('detail'); };
  const handleReact = (postId, type) => {
    const key = `${boardPrefix}_${postId}`; const prev = myReactions[key]; const next = prev === type ? undefined : type;
    setMyReactions(r => ({ ...r, [key]: next }));
    const upd = p => p.id !== postId ? p : applyReaction(p, prev, next);
    setFreePosts(ps => ps.map(upd)); setSelected(s => s ? upd(s) : s);
  };
  const handleAddComment = () => {
    if (!newComment.trim()) return;
    const createdAt = communityNowIso();
    const c = { id: Date.now(), author: commentAnon ? '익명' : nickname, isAnonymous: commentAnon, text: newComment, likes: 0, createdAt, time: createdAt };
    setSelected(s => ({ ...s, comments: [...s.comments, c] }));
    setFreePosts(ps => ps.map(p => p.id === selected.id ? { ...p, comments: [...p.comments, c] } : p));
    createCommunityNotification({ targetNickname: selected.isAnonymous || selected.author === nickname ? null : selected.author, actor: c.author, actorIsAnonymous: c.isAnonymous, board: 'free', post: selected, entry: c });
    setNewComment('');
  };
  const handleSaveComment = cid => {
    if (!editCommentText.trim()) return;
    const upd = cs => cs.map(c => c.id === cid ? { ...c, text: editCommentText } : c);
    setSelected(s => ({ ...s, comments: upd(s.comments) }));
    setFreePosts(ps => ps.map(p => p.id === selected.id ? { ...p, comments: upd(p.comments) } : p));
    setEditCommentId(null); setEditCommentText('');
  };
  const handleDeleteComment = cid => {
    const upd = cs => cs.filter(c => c.id !== cid);
    setSelected(s => ({ ...s, comments: upd(s.comments) }));
    setFreePosts(ps => ps.map(p => p.id === selected.id ? { ...p, comments: upd(p.comments) } : p));
  };
  const handlePost = () => {
    if (!nTitle.trim() || !nContent.trim()) return;
    const createdAt = communityNowIso();
    const np = { id: Date.now(), title: nTitle, author: isAnon ? '익명' : nickname, isAnonymous: isAnon, content: nContent, likes: 0, dislikes: 0, views: 0, createdAt, time: createdAt, comments: [], attachments: nFiles };
    setFreePosts(ps => [np, ...ps]); setNTitle(''); setNContent(''); setIsAnon(false); setNFiles([]); setView('list');
  };
  const handleDelete = id => { setFreePosts(ps => ps.filter(p => p.id !== id)); goList(); };
  const startEdit = p => { setETitle(p.title); setEContent(p.content); setEFiles(p.attachments || []); setEditing(true); };
  const handleEdit = () => {
    const upd = { ...selected, title: eTitle, content: eContent, attachments: eFiles };
    setFreePosts(ps => ps.map(p => p.id === selected.id ? upd : p)); setSelected(upd); setEditing(false);
  };
  const insertImgMarker = (imgEntry, setter, ref) => {
    const marker = `[[${imgEntry.name ?? imgEntry.file?.name}]]`;
    const el = ref.current;
    if (!el) { setter(v => v + '\n' + marker); return; }
    const s = el.selectionStart, e = el.selectionEnd;
    setter(v => v.slice(0, s) + '\n' + marker + '\n' + v.slice(e));
    requestAnimationFrame(() => { el.selectionStart = el.selectionEnd = s + marker.length + 2; el.focus(); });
  };
  const AnonToggle = ({ value, onChange }) => (
    <button onClick={() => onChange(!value)} className={`flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-xl border transition-all ${value ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-500 border-gray-200'}`}>
      {value ? <UserX size={12} /> : <User size={12} />}{value ? '익명' : '실명'}
    </button>
  );

  if (view === 'new') return (
    <div className="flex flex-col gap-3">
      <BackBtn onBack={() => setView('list')} />
      <div className="flex items-center justify-between">
        <h3 className="font-bold text-gray-800">글 작성</h3>
        <AnonToggle value={isAnon} onChange={setIsAnon} />
      </div>
      <input className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-purple-400" placeholder="제목" value={nTitle} onChange={e => setNTitle(e.target.value)} />
      <textarea ref={nContentRef} className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-purple-400 resize-none" rows={6} placeholder="내용을 입력하세요" value={nContent} onChange={e => setNContent(e.target.value)} />
      <AttachBtn files={nFiles} onFiles={setNFiles} onImageInsert={img => insertImgMarker(img, setNContent, nContentRef)} />
      <p className="text-xs text-gray-400 flex items-center gap-1"><AlertCircle size={11} />{isAnon ? '익명으로 게시됩니다.' : `${nickname}으로 게시됩니다.`}</p>
      <button type="button" onClick={handlePost} className="bg-purple-500 text-white rounded-xl py-3 text-sm font-bold active:scale-95">게시하기</button>
    </div>
  );

  if (view === 'detail' && selected) {
    const isOwner = (!selected.isAnonymous && selected.author === nickname) || isAdmin;
    const myReact = myReactions[`${boardPrefix}_${selected.id}`];
    if (editing) return (
      <div className="flex flex-col gap-3">
        <BackBtn onBack={() => setEditing(false)} label="취소" />
        <h3 className="font-bold text-gray-800">글 수정</h3>
        <input className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-purple-400" value={eTitle} onChange={e => setETitle(e.target.value)} />
        <textarea ref={eContentRef} className="border rounded-xl px-3 py-2 text-sm outline-none focus:border-purple-400 resize-none" rows={6} value={eContent} onChange={e => setEContent(e.target.value)} />
        <AttachBtn files={eFiles} onFiles={setEFiles} onImageInsert={img => insertImgMarker(img, setEContent, eContentRef)} />
        <button onClick={handleEdit} className="bg-purple-500 text-white rounded-xl py-3 text-sm font-bold active:scale-95">수정 완료</button>
      </div>
    );
    return (
      <div className="flex flex-col gap-3">
        <div className="flex items-center justify-between">
          <BackBtn onBack={goList} />
          {isOwner && (
            <div className="flex gap-2 mb-3">
              <button onClick={() => startEdit(selected)} className="flex items-center gap-1 text-xs text-blue-500 px-2 py-1 rounded-lg border border-blue-200 hover:bg-blue-50"><Edit2 size={11} />수정</button>
              <button onClick={() => setConfirmDel(true)} className="flex items-center gap-1 text-xs text-red-500 px-2 py-1 rounded-lg border border-red-200 hover:bg-red-50"><Trash2 size={11} />삭제</button>
            </div>
          )}
        </div>
        {confirmDel && <ConfirmDialog msg="정말 삭제하시겠어요?" onOk={() => { setConfirmDel(false); handleDelete(selected.id); }} onCancel={() => setConfirmDel(false)} />}
        {confirmComment && <ConfirmDialog msg="댓글을 삭제하시겠어요?" onOk={() => { handleDeleteComment(confirmComment); setConfirmComment(null); }} onCancel={() => setConfirmComment(null)} />}
        {lightbox && (<div onClick={() => setLightbox(null)} className="fixed inset-0 bg-black/80 flex items-center justify-center z-50"><img src={lightbox} alt="" className="max-w-[90vw] max-h-[90vh] rounded-2xl shadow-2xl" /><button type="button" onClick={() => setLightbox(null)} className="absolute top-4 right-4 text-white text-2xl font-bold w-9 h-9 rounded-full bg-white/20 flex items-center justify-center">×</button></div>)}
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <h3 className="font-bold text-gray-800 text-base mb-1">{selected.title}</h3>
          <div className="flex items-center gap-2 mb-3 text-[11px] text-gray-400">
            <NickChip name={selected.author} isAnon={selected.isAnonymous} onViewProfile={onViewProfile} className="flex items-center gap-1 text-[11px] text-gray-400" size="xs" />
            <span className="flex items-center gap-1"><Clock size={10} />{formatCommunityTime(selected.createdAt || selected.time)}</span>
            <span className="flex items-center gap-1"><Eye size={10} />{selected.views || 0}</span>
          </div>
          {renderContent(selected.content, selected.attachments, setLightbox)}
          <AttachList files={selected.attachments} />
        </div>
        <div className="flex gap-2">
          <button onClick={() => handleReact(selected.id, 'like')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border text-sm font-bold active:scale-95 transition-all ${myReact === 'like' ? 'bg-purple-500 text-white border-purple-500' : 'border-purple-200 text-purple-600 bg-purple-50'}`}><ThumbsUp size={14} />{selected.likes}</button>
          <button onClick={() => handleReact(selected.id, 'dislike')} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl border text-sm font-bold active:scale-95 transition-all ${myReact === 'dislike' ? 'bg-red-500 text-white border-red-500' : 'border-red-200 text-red-500 bg-red-50'}`}><ThumbsDown size={14} />{selected.dislikes}</button>
        </div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <h4 className="font-bold text-gray-700 text-sm mb-3">댓글 {selected.comments.length}</h4>
          <div className="flex flex-col gap-2 mb-3">
            {selected.comments.map(c => {
              const canEdit = (!c.isAnonymous && c.author === nickname) || isAdmin;
              return (
                <div key={c.id} className="bg-gray-50 rounded-xl p-3">
                  <div className="flex items-center justify-between mb-1">
                    <NickChip name={c.author} isAnon={c.isAnonymous} onViewProfile={onViewProfile} className="flex items-center gap-1 text-xs font-bold text-gray-600" size="xs" />
                    <div className="flex items-center gap-1">
                      <span className="text-[10px] text-gray-400">{formatCommunityTime(c.createdAt || c.time)}</span>
                      {canEdit && editCommentId !== c.id && <>
                        <button onClick={() => { setEditCommentId(c.id); setEditCommentText(c.text); }} className="text-[10px] text-blue-400 hover:text-blue-600 px-1"><Edit2 size={10} /></button>
                        <button type="button" onClick={() => setConfirmComment(c.id)} className="text-[10px] text-red-400 hover:text-red-600 px-1"><Trash2 size={10} /></button>
                      </>}
                    </div>
                  </div>
                  {editCommentId === c.id ? (
                    <div className="flex gap-2 mt-1">
                      <input className="flex-1 border rounded-lg px-2 py-1 text-xs outline-none focus:border-purple-400" value={editCommentText} onChange={e => setEditCommentText(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSaveComment(c.id)} />
                      <button onClick={() => handleSaveComment(c.id)} className="text-xs bg-purple-500 text-white px-2 py-1 rounded-lg">저장</button>
                      <button onClick={() => setEditCommentId(null)} className="text-xs text-gray-400 px-1">취소</button>
                    </div>
                  ) : <p className="text-xs text-gray-700">{c.text}</p>}
                </div>
              );
            })}
            {selected.comments.length === 0 && <p className="text-xs text-gray-400 text-center py-2">첫 댓글을 달아보세요!</p>}
          </div>
          <div className="flex flex-col gap-2">
            <div className="flex items-center justify-between">
              <span className="text-xs text-gray-500">댓글 작성</span>
              <AnonToggle value={commentAnon} onChange={setCommentAnon} />
            </div>
            <div className="flex gap-2">
              <input className="flex-1 border rounded-xl px-3 py-2 text-xs outline-none focus:border-purple-400" placeholder="댓글 입력..." value={newComment} onChange={e => setNewComment(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddComment()} />
              <button onClick={handleAddComment} className="bg-purple-500 text-white p-2 rounded-xl active:scale-95"><Send size={13} /></button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="flex flex-col gap-3">
      <div className="flex items-center justify-between">
        <h3 className="font-bold text-gray-800">자유게시판</h3>
        <button onClick={() => setView('new')} className="flex items-center gap-1 bg-purple-500 text-white text-xs px-3 py-2 rounded-xl font-bold active:scale-95"><Plus size={12} />글쓰기</button>
      </div>
      <div className="flex items-center gap-2 bg-white border rounded-xl px-3 py-2">
        <Search size={13} className="text-gray-400" />
        <input className="flex-1 text-xs outline-none" placeholder="게시글 검색..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      <div className="flex flex-col gap-2">
        {freePosts.filter(p => p.title.includes(search) || p.content.includes(search)).map(p => (
          <button key={p.id} onClick={() => openPost(p)} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-left active:scale-[0.98] transition-transform">
            <div className="flex items-start justify-between mb-1">
              <p className="font-bold text-sm text-gray-800 flex-1 pr-2">{p.title}</p>
              {p.isAnonymous && <Badge text="익명" color="bg-gray-100 text-gray-500" />}
            </div>
            <p className="text-xs text-gray-500 line-clamp-2 mb-2">{p.content}</p>
            <div className="flex items-center gap-3 text-[11px] text-gray-400">
              <NickChip name={p.author} isAnon={p.isAnonymous} onViewProfile={onViewProfile} className="flex items-center gap-0.5 text-[11px] text-gray-400" size="xs" />
              <span className="flex items-center gap-0.5 text-purple-500"><ThumbsUp size={10} />{p.likes}</span>
              <span className="flex items-center gap-0.5 text-red-400"><ThumbsDown size={10} />{p.dislikes}</span>
              <span className="flex items-center gap-0.5"><MessageSquare size={10} />{p.comments.length}</span>
              <span className="flex items-center gap-0.5"><Eye size={10} />{p.views || 0}</span>
              {!p.isAnonymous && p.author === nickname && <span className="text-indigo-400 font-bold text-[10px]">내 글</span>}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// 메인 CommunityFeature
// ════════════════════════════════════════════════════════
const communityObjectToList = (value, fallback) => {
  if (Array.isArray(value)) return value.filter(Boolean);
  if (value && typeof value === "object") {
    return Object.entries(value)
      .filter(([key]) => key !== "updatedAt")
      .map(([id, item]) => ({ ...(item || {}), id: item?.id ?? id }))
      .filter(item => item && item.id !== undefined);
  }
  return fallback;
};
const idSetFromList = list => new Set((list || []).map(item => String(item.id)));
const syncCommunityBoard = async (boardKey, list, savedIdsRef) => {
  const nextIds = idSetFromList(list);
  const prevIds = savedIdsRef.current[boardKey] || new Set();
  const writes = (list || []).map(item => cloudPut(["community", boardKey, item.id], item));
  const deletes = [...prevIds].filter(id => !nextIds.has(id)).map(id => cloudDelete(["community", boardKey, id]));
  await Promise.all([...writes, ...deletes]);
  savedIdsRef.current[boardKey] = nextIds;
};
function CommunityFeature({ nickname, onHome, initialCommunityTarget, onCommunityTargetHandled }) {
  const publicProfile = usePublicProfile(nickname);
  const [problems, setProblems]     = useState(() => normalizeProblems(lsGet('mcu_problems', INIT_PROBLEMS)));
  const [qnaPosts, setQnaPosts]     = useState(() => normalizeQnaPosts(lsGet('mcu_qna', INIT_QNA)));
  const [freePosts, setFreePosts]   = useState(() => normalizeFreePosts(lsGet('mcu_free', INIT_FREE)));
  const communitySavedIdsRef = useRef({ problems: new Set(), qnaPosts: new Set(), freePosts: new Set() });
  const pointsKey    = `mcu_points_${nickname}`;
  const reactionsKey = `mcu_reactions_${nickname}`;
  const itemsKey     = `mcu_items_${nickname}`;
  const [userPoints, setUserPoints] = useState(() => lsGet(pointsKey, 350));
  // ownedItems: Set-like array of reward effect strings the user has purchased
  const [ownedItems,  setOwnedItems]  = useState(() => lsGet(itemsKey, []));
  // equippedItems: subset of ownedItems currently active
  const [equippedItems, setEquippedItems] = useState(() => lsGet(`${itemsKey}_eq`, []));
  useEffect(() => lsSet('mcu_problems', problems),   [problems]);
  useEffect(() => lsSet('mcu_qna',      qnaPosts),   [qnaPosts]);
  useEffect(() => lsSet('mcu_free',     freePosts),  [freePosts]);
  useEffect(() => lsSet(pointsKey,   userPoints),   [userPoints]);
  useEffect(() => lsSet(itemsKey,    ownedItems),   [ownedItems]);
  useEffect(() => lsSet(`${itemsKey}_eq`, equippedItems), [equippedItems]);

  const bioKey = `mcu_bio_${nickname}`;
  const [bio, setBio] = useState(() => lsGet(bioKey, ''));
  const [editingBio, setEditingBio] = useState(false);
  const [bioInput, setBioInput] = useState('');
  useEffect(() => lsSet(bioKey, bio), [bio]);

  // 다른 유저 프로필 보기
  const [viewingProfile, setViewingProfile] = useState(null); // null or nickname string

  const [nav, setNav]               = useState({ board: null, postId: null, fromMyPosts: false });
  const [showMyPosts, setShowMyPosts] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [myPostsTab, setMyPostsTab] = useState('posts'); // 'posts' | 'comments' | 'likes' | 'dislikes'
  const [myReactions, setMyReactions] = useState(() => lsGet(reactionsKey, {}));
  useEffect(() => lsSet(reactionsKey, myReactions), [myReactions]);
  const [communityCloudReady, setCommunityCloudReady] = useState(false);
  const [profileCloudReady, setProfileCloudReady] = useState(false);

  useEffect(() => {
    if (!initialCommunityTarget?.board || initialCommunityTarget.postId === undefined || initialCommunityTarget.postId === null) return;
    setShowMyPosts(false);
    setShowProfile(false);
    setViewingProfile(null);
    setNav({ board: initialCommunityTarget.board, postId: initialCommunityTarget.postId, fromMyPosts: false });
    if (onCommunityTargetHandled) onCommunityTargetHandled();
  }, [initialCommunityTarget?.id]);

  useEffect(() => {
    let alive = true;
    cloudGet(["community"], null).then(data => {
      if (!alive) return;
      const nextProblems = normalizeProblems(communityObjectToList(data?.problems, INIT_PROBLEMS));
      const nextQnaPosts = normalizeQnaPosts(communityObjectToList(data?.qnaPosts, INIT_QNA));
      const nextFreePosts = normalizeFreePosts(communityObjectToList(data?.freePosts, INIT_FREE));
      communitySavedIdsRef.current = {
        problems: idSetFromList(nextProblems),
        qnaPosts: idSetFromList(nextQnaPosts),
        freePosts: idSetFromList(nextFreePosts),
      };
      setProblems(nextProblems);
      setQnaPosts(nextQnaPosts);
      setFreePosts(nextFreePosts);
    }).finally(() => { if (alive) setCommunityCloudReady(true); });
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    let alive = true;
    setProfileCloudReady(false);
    cloudGet(["users", nickname || "guest", "communityProfile"], null).then(data => {
      if (!alive) return;
      const profile = data || {
        userPoints: lsGet(pointsKey, 350),
        ownedItems: lsGet(itemsKey, []),
        equippedItems: lsGet(`${itemsKey}_eq`, []),
        bio: lsGet(bioKey, ""),
        myReactions: lsGet(reactionsKey, {}),
      };
      setUserPoints(profile.userPoints ?? 350);
      setOwnedItems(asList(profile.ownedItems));
      setEquippedItems(asList(profile.equippedItems));
      setBio(profile.bio || "");
      setMyReactions(profile.myReactions || {});
    }).finally(() => { if (alive) setProfileCloudReady(true); });
    return () => { alive = false; };
  }, [nickname]);

  useEffect(() => {
    if (!communityCloudReady) return;
    const id = setTimeout(() => {
      syncCommunityBoard("problems", problems, communitySavedIdsRef);
      syncCommunityBoard("qnaPosts", qnaPosts, communitySavedIdsRef);
      syncCommunityBoard("freePosts", freePosts, communitySavedIdsRef);
      cloudPatch(["community"], { updatedAt: cloudNow() });
    }, 350);
    return () => clearTimeout(id);
  }, [communityCloudReady, problems, qnaPosts, freePosts]);

  useEffect(() => {
    if (!profileCloudReady) return;
    const id = setTimeout(() => {
      cloudPut(["users", nickname || "guest", "communityProfile"], {
        userPoints,
        ownedItems,
        equippedItems,
        bio,
        myReactions,
        updatedAt: cloudNow(),
      });
      savePublicProfile(nickname, {
        avatar: publicProfile.avatar,
        bio,
        equippedItems,
      });
    }, 350);
    return () => clearTimeout(id);
  }, [profileCloudReady, nickname, userPoints, ownedItems, equippedItems, bio, myReactions, publicProfile.avatar]);

  const toggleEquip = effect => {
    setEquippedItems(prev =>
      prev.includes(effect) ? prev.filter(e => e !== effect) : [...prev, effect]
    );
  };
  const isEquipped = effect => equippedItems.includes(effect);

  const getTop3 = list => [...list].sort((a, b) => (b.likes || 0) + (b.comments?.length || 0) * 2 - ((a.likes || 0) + (a.comments?.length || 0) * 2)).slice(0, 3);
  const trendingByBoard = {
    coding: getTop3(problems),
    qna:    [...qnaPosts].sort((a, b) => b.answers.length - a.answers.length).slice(0, 3),
    free:   getTop3(freePosts),
  };

  const myPosts = [
    ...problems.filter(p => p.author === nickname).map(p => ({ ...p, boardId: 'coding', boardLabel: '코딩 문제', boardColor: 'bg-emerald-100 text-emerald-600', snippet: p.description })),
    ...qnaPosts.filter(p => p.author === nickname).map(p => ({ ...p, boardId: 'qna',    boardLabel: 'Q&A',        boardColor: 'bg-blue-100 text-blue-600',       snippet: p.content })),
    ...freePosts.filter(p => !p.isAnonymous && p.author === nickname).map(p => ({ ...p, boardId: 'free', boardLabel: '자유게시판', boardColor: 'bg-purple-100 text-purple-600', snippet: p.content })),
  ];
  const myComments = [
    ...problems.flatMap(p => p.comments.filter(c => c.author === nickname).map(c => ({ ...c, postTitle: p.title, postId: p.id, boardId: 'coding', boardLabel: '코딩 문제', boardColor: 'bg-emerald-100 text-emerald-600', isAnswer: false }))),
    ...qnaPosts.flatMap(p => p.answers.filter(a => a.author === nickname).map(a => ({ ...a, text: a.content, postTitle: p.title, postId: p.id, boardId: 'qna', boardLabel: 'Q&A', boardColor: 'bg-blue-100 text-blue-600', isAnswer: true }))),
    ...freePosts.flatMap(p => p.comments.filter(c => !c.isAnonymous && c.author === nickname).map(c => ({ ...c, postTitle: p.title, postId: p.id, boardId: 'free', boardLabel: '자유게시판', boardColor: 'bg-purple-100 text-purple-600', isAnswer: false }))),
  ];
  const _allPosts = [
    ...problems.map(p => ({ ...p, boardId: 'coding', boardLabel: '코딩 문제', boardColor: 'bg-emerald-100 text-emerald-600', snippet: p.description })),
    ...qnaPosts.map(p =>  ({ ...p, boardId: 'qna',   boardLabel: 'Q&A',        boardColor: 'bg-blue-100 text-blue-600',       snippet: p.content })),
    ...freePosts.map(p => ({ ...p, boardId: 'free',  boardLabel: '자유게시판', boardColor: 'bg-purple-100 text-purple-600',   snippet: p.content })),
  ];
  const myLikes    = _allPosts.filter(p => myReactions[`${p.boardId}_${p.id}`] === 'like');
  const myDislikes = _allPosts.filter(p => myReactions[`${p.boardId}_${p.id}`] === 'dislike');

  const goToPost = (boardId, postId, fromMyPosts = false) => { setShowMyPosts(false); setNav({ board: boardId, postId, fromMyPosts }); };
  const clearInitPost = () => setNav(n => ({ ...n, postId: null, fromMyPosts: false }));
  const goBack = () => {
    if (nav.fromMyPosts) { setNav({ board: null, postId: null, fromMyPosts: false }); setShowMyPosts(true); }
    else                 { setNav({ board: null, postId: null, fromMyPosts: false }); }
  };

  const onViewProfile = name => { if (name && name !== '익명') setViewingProfile(name); };

  const isAdmin = nickname === 'yi134679';
  const renderBoard = () => {
    const common = { myReactions, setMyReactions, onViewProfile, isAdmin };
    if (nav.board === 'coding') return <CodingBoard nickname={nickname} problems={problems} setProblems={setProblems} initPostId={nav.postId} onClearInitPost={clearInitPost} boardPrefix="coding" {...common} />;
    if (nav.board === 'qna')    return <QnABoard    nickname={nickname} qnaPosts={qnaPosts} setQnaPosts={setQnaPosts} userPoints={userPoints} setUserPoints={setUserPoints} ownedItems={ownedItems} setOwnedItems={setOwnedItems} initPostId={nav.postId} onClearInitPost={clearInitPost} boardPrefix="qna" {...common} />;
    if (nav.board === 'free')   return <FreeBoard   nickname={nickname} freePosts={freePosts} setFreePosts={setFreePosts} initPostId={nav.postId} onClearInitPost={clearInitPost} boardPrefix="free" {...common} />;
  };

  const TAB_CONFIG = [
    { tab: 'posts',    Icon: FileText,       label: '내 글',   list: myPosts },
    { tab: 'comments', Icon: MessageCircle,  label: '댓글',    list: myComments },
    { tab: 'likes',    Icon: ThumbsUp,       label: '좋아요',  list: myLikes },
    { tab: 'dislikes', Icon: ThumbsDown,     label: '싫어요',  list: myDislikes },
  ];

  return (
    <div className="flex flex-col h-full bg-gray-50">
      {/* 다른 유저 프로필 모달 */}
      {viewingProfile && <UserProfileModal targetNick={viewingProfile} onClose={() => setViewingProfile(null)} />}
      {/* 헤더 */}
      <div className="flex items-center gap-2 px-4 py-3 bg-white border-b border-gray-100 shrink-0">
        {nav.board || showMyPosts || showProfile ? (
          <button onClick={() => { if (nav.board) goBack(); else if (showMyPosts) setShowMyPosts(false); else setShowProfile(false); }} className="flex items-center gap-1 text-emerald-600 font-medium text-sm">
            <ChevronLeft size={16} />{nav.board ? (nav.fromMyPosts ? '내가 쓴 글' : '커뮤니티') : '커뮤니티'}
          </button>
        ) : (
          <><Users size={16} className="text-emerald-500" /><span className="font-bold text-gray-800 text-sm">커뮤니티</span>{nickname === 'yi134679' && <span className="ml-1 text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded-full font-bold">관리자</span>}</>
        )}
        <div className="ml-auto flex items-center gap-1">
          {!nav.board && !showMyPosts && !showProfile && (<>
            <button onClick={() => setShowMyPosts(true)} className="flex items-center gap-1 text-xs text-indigo-500 border border-indigo-200 px-2 py-1 rounded-lg hover:bg-indigo-50">
              <FileText size={12} />내 글
            </button>
            <button onClick={() => setShowProfile(true)} className="flex items-center gap-1 text-xs text-amber-500 border border-amber-200 px-2 py-1 rounded-lg hover:bg-amber-50">
              <User size={12} />프로필
            </button>
          </>)}
          <button onClick={onHome} className="flex items-center gap-1 text-xs text-gray-400 hover:text-indigo-500 px-2 py-1 rounded-lg hover:bg-indigo-50"><Home size={13} />홈</button>
        </div>
      </div>

      {/* 본문 */}
      <div className="flex-1 overflow-y-auto px-4 py-4">
        {/* 프로필 화면 */}
        {showProfile && !nav.board && (() => {
          const hasDark    = isEquipped('dark-bg');
          const hasGold    = isEquipped('gold-frame');
          const hasCrown   = isEquipped('crown');
          const hasRainbow = isEquipped('rainbow');
          return (
            <div className="flex flex-col gap-4">
              {/* 프로필 카드 */}
              <div className={`rounded-3xl p-6 flex flex-col items-center gap-3 shadow-sm border ${hasDark ? 'bg-gray-900 border-gray-700' : 'bg-white border-gray-100'}`}>
                {/* 아바타 */}
                <ProfileAvatar
                  avatar={publicProfile.avatar}
                  nickname={nickname}
                  size="xl"
                  className={`shadow-md ${hasGold ? 'ring-4 ring-yellow-400 ring-offset-2' : ''} ${hasDark ? 'bg-gray-700' : ''}`}
                />
                {/* 닉네임 */}
                <div className="flex items-center gap-1.5">
                  {hasCrown && <span className="text-lg">👑</span>}
                  <span className={`text-xl font-black ${hasRainbow ? 'bg-gradient-to-r from-red-500 via-yellow-400 via-green-400 via-blue-500 to-purple-500 bg-clip-text text-transparent' : hasDark ? 'text-white' : 'text-gray-800'}`}>
                    {nickname}
                  </span>
                </div>
                {/* 포인트 */}
                <div className="flex items-center gap-1.5 bg-amber-50 border border-amber-200 rounded-full px-4 py-1.5">
                  <Trophy size={13} className="text-amber-500" />
                  <span className="text-sm font-black text-amber-600">{userPoints.toLocaleString()} P</span>
                </div>
                {/* 한 줄 소개 */}
                {editingBio ? (
                  <div className="w-full flex flex-col gap-2">
                    <input
                      className={`w-full text-sm text-center rounded-xl px-3 py-2 outline-none border ${hasDark ? 'bg-gray-700 text-white border-gray-600 placeholder-gray-400' : 'bg-gray-50 text-gray-800 border-gray-200'} focus:border-emerald-400`}
                      placeholder="한 줄 소개를 입력하세요 (최대 60자)"
                      maxLength={60}
                      value={bioInput}
                      onChange={e => setBioInput(e.target.value)}
                      autoFocus
                    />
                    <div className="flex gap-2 justify-center">
                      <button onClick={() => { setBio(bioInput.trim()); setEditingBio(false); }} className="text-xs bg-emerald-500 text-white px-4 py-1.5 rounded-xl font-bold active:scale-95">저장</button>
                      <button onClick={() => setEditingBio(false)} className="text-xs text-gray-400 px-3 py-1.5 rounded-xl border border-gray-200 hover:bg-gray-50">취소</button>
                    </div>
                  </div>
                ) : (
                  <button onClick={() => { setBioInput(bio); setEditingBio(true); }}
                    className={`text-sm text-center px-3 py-1.5 rounded-xl transition-colors max-w-[240px] ${bio ? (hasDark ? 'text-gray-300 hover:bg-gray-700' : 'text-gray-500 hover:bg-gray-50') : 'text-gray-300 italic hover:bg-gray-50'}`}>
                    {bio || '+ 한 줄 소개 추가'}
                  </button>
                )}
                {/* 장착 중인 아이템 */}
                {equippedItems.length > 0 && (
                  <div className="flex flex-wrap gap-1 justify-center">
                    {REWARDS.filter(r => equippedItems.includes(r.effect)).map(r => (
                      <span key={r.effect} className="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-semibold flex items-center gap-0.5">
                        {r.icon} {r.name} 장착 중
                      </span>
                    ))}
                  </div>
                )}
              </div>
              {/* 보유 아이템 */}
              <div>
                <h4 className="font-bold text-gray-700 text-sm mb-2 flex items-center gap-1"><Crown size={13} className="text-amber-500" />보유 아이템</h4>
                {ownedItems.length === 0
                  ? <p className="text-xs text-gray-400 text-center py-6 bg-white rounded-2xl border border-gray-100">아직 구매한 아이템이 없어요.<br/>Q&A 답변 채택으로 포인트를 모아보세요!</p>
                  : <div className="grid grid-cols-2 gap-2">
                      {REWARDS.filter(r => ownedItems.includes(r.effect)).map(r => {
                        const equipped = isEquipped(r.effect);
                        return (
                          <div key={r.effect} className={`bg-white rounded-2xl p-3 shadow-sm border transition-all ${equipped ? 'border-emerald-300 bg-emerald-50' : 'border-gray-100'}`}>
                            <div className="text-2xl mb-1">{r.icon}</div>
                            <p className="font-bold text-sm text-gray-800">{r.name}</p>
                            <p className="text-[10px] text-gray-400 mb-2">{r.desc}</p>
                            <button
                              onClick={() => toggleEquip(r.effect)}
                              className={`w-full text-xs py-1.5 rounded-xl font-bold active:scale-95 transition-all ${equipped ? 'bg-emerald-500 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                            >
                              {equipped ? '✓ 장착 중 (해제)' : '장착하기'}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                }
              </div>
            </div>
          );
        })()}

        {/* 내 글 화면 */}
        {showMyPosts && !nav.board && !showProfile && (
          <div className="flex flex-col gap-3">
            {/* 4탭 */}
            <div className="grid grid-cols-4 bg-gray-100 rounded-2xl p-1 gap-1">
              {TAB_CONFIG.map(({ tab, Icon, label, list }) => (
                <button key={tab} onClick={() => setMyPostsTab(tab)}
                  className={`flex flex-col items-center justify-center py-2 rounded-xl text-[10px] font-bold transition-all ${myPostsTab === tab ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-400'}`}>
                  <Icon size={12} className="mb-0.5" />{label} ({list.length})
                </button>
              ))}
            </div>

            {/* 내 글 탭 */}
            {myPostsTab === 'posts' && (
              <div className="flex flex-col gap-2">
                {myPosts.length === 0 && <p className="text-center text-sm text-gray-400 py-8">아직 작성한 글이 없어요.</p>}
                {myPosts.map((p, i) => (
                  <button key={i} onClick={() => goToPost(p.boardId, p.id, true)} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-left active:scale-[0.98] transition-transform">
                    <div className="flex items-start justify-between mb-1"><p className="font-bold text-sm text-gray-800 flex-1 pr-2 line-clamp-1">{p.title}</p><Badge text={p.boardLabel} color={p.boardColor} /></div>
                    <p className="text-xs text-gray-500 line-clamp-2 mb-2">{p.snippet}</p>
                    <div className="flex items-center gap-3 text-[11px] text-gray-400">
                      <span className="flex items-center gap-0.5"><Clock size={10} />{formatCommunityTime(p.createdAt || p.time)}</span>
                      {p.likes !== undefined && <span className="flex items-center gap-0.5 text-blue-400"><ThumbsUp size={10} />{p.likes}</span>}
                      {p.comments !== undefined && <span className="flex items-center gap-0.5"><MessageSquare size={10} />{p.comments.length}</span>}
                    </div>
                  </button>
                ))}
              </div>
            )}

            {/* 댓글 탭 */}
            {myPostsTab === 'comments' && (
              <div className="flex flex-col gap-2">
                {myComments.length === 0 && <p className="text-center text-sm text-gray-400 py-8">아직 작성한 댓글/답변이 없어요.</p>}
                {myComments.map((c, i) => (
                  <button key={i} onClick={() => goToPost(c.boardId, c.postId, true)} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-left active:scale-[0.98] transition-transform">
