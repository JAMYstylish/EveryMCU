<!-- JSX 원본 (실행 안 되는 타입으로 보관) -->
<script type="text/jsx-source" id="appSource">
// ============================================================
// 에브리엠씨유 (EveryMCU) - 통합 앱 (알람 + 학습추적 + 최신기사)
// ============================================================
// 화면 흐름: 스플래시 → 닉네임 → 홈(탭 메뉴)
// 통합 기능: 알람, 학습추적, 최신기사
// 준비중(더미): 주간코황(코딩배틀), 커뮤니티  ← 나중에 교체
//
// 각 기능 컴포넌트는 { nickname, onHome } props를 받습니다.
// ============================================================

// Firebase Realtime Database REST 동기화 레이어
const FIREBASE_DATABASE_URL = (window.EVERYMCU_FIREBASE_DATABASE_URL || "https://every-mcu-default-rtdb.asia-southeast1.firebasedatabase.app").replace(/\/+$/, "");
const FIREBASE_AUTH_API_KEY = window.EVERYMCU_FIREBASE_API_KEY || "AIzaSyA-6zuZp-AFrk4DD29D0nO5hAzqaphiBd8";
const FIREBASE_ROOT_PATH = "everymcuIntegrated";
const AUTH_SESSION_KEY = "everymcu-auth-session-v1";
const LAST_NICKNAME_KEY = "everymcu-last-nickname-v1";
const CLOUD_STATUS_EVENT = "everymcu-cloud-status";
const PROFILE_UPDATED_EVENT = "everymcu-profile-updated";
const DEFAULT_PROFILE_AVATAR = "🧑‍💻";
const PIN_MIN_LENGTH = 4;
const PIN_MAX_LENGTH = 12;
const PIN_PASSWORD_PREFIX = "EveryMCU_PIN_v1:";
const cloudSegment = value => encodeURIComponent(String(value ?? "guest").trim().replace(/[.#$\[\]\/]/g, "_") || "guest");
const scopedLocalKey = (base, nickname) => `${base}-${cloudSegment(nickname || "guest")}`;
const cloudUrl = (...parts) => {
  const path = [FIREBASE_ROOT_PATH, ...parts.flat().filter(Boolean).map(cloudSegment)].join("/");
  return `${FIREBASE_DATABASE_URL}/${path}.json`;
};
const cloudNow = () => new Date().toISOString();
const readLocalJson = (key, fallback = null) => {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
};
const writeLocalJson = (key, value) => {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
};
const readLastNickname = () => {
  try { return localStorage.getItem(LAST_NICKNAME_KEY)?.trim() || ""; } catch { return ""; }
};
const saveLastNickname = (nickname) => {
  try { localStorage.setItem(LAST_NICKNAME_KEY, nickname.trim()); } catch {}
};
const forgetLastNickname = () => {
  try { localStorage.removeItem(LAST_NICKNAME_KEY); } catch {}
};
const emitCloudStatus = (state, message = "") => {
  if (typeof window === "undefined") return;
  window.dispatchEvent(new CustomEvent(CLOUD_STATUS_EVENT, { detail: { state, message, at: Date.now() } }));
};
let cloudAuthSession = readLocalJson(AUTH_SESSION_KEY, null);
let cloudAuthPromise = null;
const isFreshAuthSession = (session) => session?.idToken && Number(session.expiresAt || 0) > Date.now() + 60000;
const saveCloudAuthSession = (session) => {
  cloudAuthSession = session;
  writeLocalJson(AUTH_SESSION_KEY, session);
};
const clearCloudAuthSession = () => {
  cloudAuthSession = null;
  try { localStorage.removeItem(AUTH_SESSION_KEY); } catch {}
};
const normalizeNicknameForAuth = (nickname) => String(nickname || "").trim().normalize("NFKC");
const hashNicknameForAuth = (nickname) => {
  let hash = 2166136261;
  for (const char of Array.from(normalizeNicknameForAuth(nickname))) {
    const code = char.codePointAt(0) || 0;
    hash ^= code & 255;
    hash = Math.imul(hash, 16777619);
    hash ^= (code >>> 8) & 255;
    hash = Math.imul(hash, 16777619);
    hash ^= (code >>> 16) & 255;
    hash = Math.imul(hash, 16777619);
  }
  return (hash >>> 0).toString(36);
};
const authEmailForNickname = (nickname) => `u-${hashNicknameForAuth(nickname)}@users.everymcu.app`;
const isValidNumericPin = (pin) => new RegExp(`^\\d{${PIN_MIN_LENGTH},${PIN_MAX_LENGTH}}$`).test(String(pin || ""));
const authPasswordFromPin = (pin) => `${PIN_PASSWORD_PREFIX}${pin}`;
const readAuthError = async (response) => {
  try {
    const data = await response.json();
    return data?.error?.message || `AUTH_${response.status}`;
  } catch {
    return `AUTH_${response.status}`;
  }
};
const sessionFromAuthResponse = (data, nickname, email) => ({
  authMethod: "password",
  email,
  idToken: data.idToken,
  nickname,
  refreshToken: data.refreshToken,
  uid: data.localId,
  expiresAt: Date.now() + Number(data.expiresIn || 3600) * 1000,
});
const signUpPasswordSession = async (nickname, pin) => {
  const email = authEmailForNickname(nickname);
  const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${encodeURIComponent(FIREBASE_AUTH_API_KEY)}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password: authPasswordFromPin(pin), returnSecureToken: true }),
  });
  if (!res.ok) throw new Error(await readAuthError(res));
  const data = await res.json();
  const session = sessionFromAuthResponse(data, nickname, email);
  saveCloudAuthSession(session);
  return session;
};
const signInPasswordSession = async (nickname, pin) => {
  const email = authEmailForNickname(nickname);
  const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${encodeURIComponent(FIREBASE_AUTH_API_KEY)}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password: authPasswordFromPin(pin), returnSecureToken: true }),
  });
  if (!res.ok) throw new Error(await readAuthError(res));
  const data = await res.json();
  const session = sessionFromAuthResponse(data, nickname, email);
  saveCloudAuthSession(session);
  return session;
};
const linkCurrentSessionToPassword = async (nickname, pin) => {
  const current = await ensureCloudAuth();
  if (!current?.idToken || current.email) return null;
  const email = authEmailForNickname(nickname);
  const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:update?key=${encodeURIComponent(FIREBASE_AUTH_API_KEY)}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ idToken: current.idToken, email, password: authPasswordFromPin(pin), returnSecureToken: true }),
  });
  if (!res.ok) throw new Error(await readAuthError(res));
  const data = await res.json();
  const session = sessionFromAuthResponse(data, nickname, email);
  saveCloudAuthSession(session);
  return session;
};
const refreshCloudAuthSession = async (refreshToken) => {
  const res = await fetch(`https://securetoken.googleapis.com/v1/token?key=${encodeURIComponent(FIREBASE_AUTH_API_KEY)}`, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ grant_type: "refresh_token", refresh_token: refreshToken }),
  });
  if (!res.ok) throw new Error(`Auth refresh failed: ${res.status}`);
  const data = await res.json();
  const session = {
    ...cloudAuthSession,
    idToken: data.id_token,

function usePublicProfile(nickname) {

  useEffect(() => {
    let alive = true;
    if (!cleanName || cleanName === "익명") {
      setProfile(readCachedPublicProfile(cleanName));
      return () => { alive = false; };
    }

    const cached = readCachedPublicProfile(cleanName);
    setProfile(cached);
    cloudGet(["publicProfiles", cleanName], null).then(data => {
      if (!alive || !data) return;
      const next = {
        ...cached,
        ...data,
        nickname: cleanName,
        avatar: cleanProfileAvatar(data.avatar ?? cached.avatar),
        equippedItems: data.equippedItems === undefined ? asList(cached.equippedItems) : asList(data.equippedItems),
      };

      setProfile(next);

    const now = cloudNow();
    const ok = await cloudPut(["nicknameClaims", cleanName], {
      authMethod: session.authMethod || "password",
      createdAt: existing?.createdAt || now,
      email: session.email || authEmailForNickname(cleanName),
      nickname: cleanName,
      ownerUid: session.uid,
      updatedAt: now,
    });

  } catch (err) {
    console.warn("[EveryMCU] nickname claim failed", err);
    return { ok: false, message: "계정 연결에 실패했어요. 인터넷 연결을 확인해주세요." };
  }

async function authenticateWithNicknamePin(nickname, pin) {
  const cleanName = normalizeNicknameForAuth(nickname);
  const cleanPin = String(pin || "").trim();
  if (!cleanName) return { ok: false, message: "닉네임을 입력해주세요." };
  if (!isValidNumericPin(cleanPin)) return { ok: false, message: `비밀번호는 숫자 ${PIN_MIN_LENGTH}~${PIN_MAX_LENGTH}자리로 입력해주세요.` };

  try {
    let session = await ensureCloudAuth();
    if (session?.uid && !session.email) {
      const existing = await cloudGet(["nicknameClaims", cleanName], null);
      if (existing?.ownerUid === session.uid) {
        try {
          session = await linkCurrentSessionToPassword(cleanName, cleanPin);
          const claim = await claimNicknameForSession(cleanName, session);
          return claim.ok ? { ok: true, session, mode: "linked" } : claim;
        } catch (err) {
          if (!String(err.message || "").includes("EMAIL_EXISTS")) throw err;
        }
      }
    }

    try {
      session = await signInPasswordSession(cleanName, cleanPin);
      const claim = await claimNicknameForSession(cleanName, session);
      return claim.ok ? { ok: true, session, mode: "login" } : claim;
    } catch (signInError) {
      const signInMessage = String(signInError.message || "");
      try {
        session = await signUpPasswordSession(cleanName, cleanPin);
      } catch (signUpError) {
        const signUpMessage = String(signUpError.message || "");
        if (signUpMessage.includes("EMAIL_EXISTS")) {
          return { ok: false, message: "비밀번호가 맞지 않아요." };
        }
        if (signUpMessage.includes("OPERATION_NOT_ALLOWED")) {
          return { ok: false, message: "Firebase Authentication에서 이메일/비밀번호 로그인을 켜야 해요." };
        }
        if (signInMessage.includes("INVALID_PASSWORD") || signInMessage.includes("INVALID_LOGIN_CREDENTIALS")) {
          return { ok: false, message: "비밀번호가 맞지 않아요." };
        }
        throw signUpError;
      }

      const claim = await claimNicknameForSession(cleanName, session);
      return claim.ok ? { ok: true, session, mode: "signup" } : claim;
    }
  } catch (err) {
    console.warn("[EveryMCU] password auth failed", err);
    return { ok: false, message: "로그인/회원가입에 실패했어요. 인터넷 연결을 확인해주세요." };
  }
}

}

// 셔플 큐: 난이도별로 문제가 모두 소진될 때까지 중복 없이 뽑힘
const queues = { easy: [], normal: [], hard: [] };
const shuffle = (arr) => {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
};
const pickNextProblem = (difficulty) => {
  if (queues[difficulty].length === 0) {
    queues[difficulty] = shuffle(PROBLEMS[difficulty].map((_, i) => i));
  }
  const idx = queues[difficulty].shift();
  return PROBLEMS[difficulty][idx];
};

// Pyodide 로더 (한 번만 로드)
// ── 전역 공유 Pyodide 인스턴스 (모든 기능이 같은 것 사용 — WASM 충돌 방지) ──
const ensurePyodide = () => {
  if (window._sharedPyodide) return Promise.resolve(window._sharedPyodide);
  if (window._sharedPyodidePromise) return window._sharedPyodidePromise;
  window._sharedPyodidePromise = (async () => {
    if (!window.loadPyodide) {
      await new Promise((res, rej) => {
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js";
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const inst = await window.loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/" });
    window._sharedPyodide = inst;
    return inst;
  })();
  return window._sharedPyodidePromise;
};
// 호환용 변수 (기존 코드에서 참조할 수 있음)
let pyodidePromise = null;

const normalize = (s) =>
  String(s).replace(/\r\n/g, "\n").split("\n").map((l) => l.replace(/\s+$/, "")).join("\n").replace(/\n+$/, "");

const runOneTest = (py, code, stdin) => {
  try {
    const safeStdin = (stdin == null ? "" : String(stdin));
    // 매 실행 전 결과 변수를 명확히 초기화
    py.runPython(`_result_out = ""; _result_err = ""; _result_ok = False`);
    py.globals.set("_user_code", code);
    py.globals.set("_user_stdin", safeStdin);
    py.runPython(`
import sys, io as _io
_inp = _user_stdin
if not _inp.endswith("\\n"):
    _inp = _inp + "\\n"
_old_stdin = sys.stdin
_old_stdout = sys.stdout
sys.stdin = _io.StringIO(_inp)
_buf = _io.StringIO()
sys.stdout = _buf
try:
    exec(_user_code, {})
    _result_out = _buf.getvalue()
    _result_err = ""
    _result_ok = True
except Exception as _e:
    _result_out = _buf.getvalue()
    _result_err = type(_e).__name__ + ": " + str(_e)
    _result_ok = False
finally:
    sys.stdout = _old_stdout
    sys.stdin = _old_stdin
`);
    const ok = py.globals.get("_result_ok");
    const out = String(py.globals.get("_result_out") ?? "");
    const err = String(py.globals.get("_result_err") ?? "");
    if (!ok || err) return { error: err || "unknown error", got: out };
    return { error: null, got: out };
  } catch (e) {
    return { error: String((e && e.message) || e), got: "" };
  }
};

// 10개 테스트케이스 전부 실행 — 출력 결과만으로 정답 판정 (문법/함수 조건 없음)
const runAllTests = async (py, code, tests) => {
  const results = [];
  for (let i = 0; i < tests.length; i++) {
    const t = tests[i];
    const r = runOneTest(py, code, t.input);
    const pass = !r.error && normalize(r.got) === normalize(t.output);
    results.push({ idx: i, pass, got: r.got, error: r.error || null, input: t.input, expected: t.output });
    if (!pass) break; // 첫 실패에서 중단 (어차피 전체 통과 필요)
  }
  return results;
};

const generateFeedback = (attempt, results, totalTests) => {
  const passed = results.filter((r) => r.pass).length;
  const allPassed = results.length === totalTests && results.every((r) => r.pass);
  if (allPassed) return `🎉 ${totalTests}/${totalTests} 모두 통과! 정답입니다!`;
  const fail = results.find((r) => !r.pass);
  let msg = `❌ ${attempt}회차 — ${passed}/${totalTests} 통과\n`;
  if (fail) {
    if (fail.idx === 0) {
      msg += `\n예제 테스트 실패`;
      if (fail.input !== "") msg += `\n• 입력: ${fail.input}`;
      msg += `\n• 기대: ${JSON.stringify(fail.expected)}`;
      msg += `\n• 실제: ${JSON.stringify(normalize(fail.got))}`;
    } else {
      msg += `\n숨은 테스트 #${fail.idx + 1} 실패 (입출력 비공개)`;
      msg += `\n• 실제출력: ${JSON.stringify(normalize(fail.got))}`;
    }
    if (fail.error) msg += `\n• 에러: ${fail.error}`;
  }
  return msg;
};

const AlarmFeature = ({ nickname, onHome }) => {
  const [alarms, setAlarms] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [formTime, setFormTime] = useState("07:00");
  const [formDifficulty, setFormDifficulty] = useState("easy");
  const [soundEnabled, setSoundEnabled] = useState(true);
  const [now, setNow] = useState(new Date());
  const [ringing, setRinging] = useState(null);
  const [problem, setProblem] = useState(null);
  const [code, setCode] = useState("");
  const [attempt, setAttempt] = useState(0);
  const [feedback, setFeedback] = useState("");
  const [hintLevel, setHintLevel] = useState(0);
  const [finished, setFinished] = useState(false);
  const [solvedCorrectly, setSolvedCorrectly] = useState(false);
  const [pyReady, setPyReady] = useState(false);
  const [running, setRunning] = useState(false);
  const [testStatus, setTestStatus] = useState("");
  const [alarmCloudReady, setAlarmCloudReady] = useState(false);

  const pyRef = useRef(null);
  const audioRef = useRef(null);
  const ctxRef = useRef(null);
  const vibrateRef = useRef(null);
  const firedKeysRef = useRef(new Set());

  useEffect(() => {
    ensurePyodide().then((py) => { pyRef.current = py; setPyReady(true); }).catch(() => {});
  }, []);

  useEffect(() => {
    let alive = true;
    setAlarmCloudReady(false);
    const fallback = (() => {
      try { return JSON.parse(localStorage.getItem(scopedLocalKey("everymcu-alarms", nickname)) || "null"); }
      catch { return null; }
    })();
    cloudGet(["users", nickname || "guest", "alarms"], null).then(data => {
      if (!alive) return;
      const source = data || fallback || {};
      setAlarms(Array.isArray(source.alarms) ? source.alarms : []);
      setSoundEnabled(source.soundEnabled ?? true);
    }).finally(() => { if (alive) setAlarmCloudReady(true); });
    return () => { alive = false; };
  }, [nickname]);

  useEffect(() => {
    if (!alarmCloudReady) return;
    const data = { alarms, soundEnabled, updatedAt: cloudNow() };
    try { localStorage.setItem(scopedLocalKey("everymcu-alarms", nickname), JSON.stringify(data)); } catch {}
    const id = setTimeout(() => cloudPut(["users", nickname || "guest", "alarms"], data), 300);
    return () => clearTimeout(id);
  }, [alarmCloudReady, alarms, soundEnabled, nickname]);

  // 브라우저 오디오 정책 대응: 첫 사용자 상호작용 때 AudioContext를 미리 생성·resume 해둔다.
  // 이렇게 해야 알람 시각이 됐을 때 (추가 상호작용 없이) 즉시 소리가 난다.
  useEffect(() => {
    const unlockAudio = () => {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        if (!ctxRef.current) ctxRef.current = new Ctx();
        if (ctxRef.current.state === "suspended") ctxRef.current.resume();
      } catch (e) {}
    };
    window.addEventListener("pointerdown", unlockAudio);
    window.addEventListener("keydown", unlockAudio);
    window.addEventListener("touchstart", unlockAudio);
    return () => {
      window.removeEventListener("pointerdown", unlockAudio);
      window.removeEventListener("keydown", unlockAudio);
      window.removeEventListener("touchstart", unlockAudio);
    };
  }, []);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const dateKey = () => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  };

  useEffect(() => {
    if (ringing) return;
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    const hhmm = `${hh}:${mm}`;
    for (const a of alarms) {
      if (!a.enabled) continue;
      const key = `${a.id}-${dateKey()}-${hhmm}`;
      if (a.time === hhmm && !firedKeysRef.current.has(key)) {
        firedKeysRef.current.add(key);
        triggerAlarm(a);
        break;
      }
    }
  }, [now, alarms, ringing]);

  const playBeep = () => {
    if (!soundEnabled) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      // 미리 준비된 컨텍스트 재사용 (없으면 생성)
      if (!ctxRef.current) ctxRef.current = new Ctx();
      const ctx = ctxRef.current;
      // 정지 상태면 즉시 깨워서 알람 시각에 바로 소리 나도록
      if (ctx.state === "suspended") ctx.resume();
      const beep = () => {
        try {
          if (ctx.state === "suspended") ctx.resume();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880; gain.gain.value = 0.15;
          osc.start(); osc.stop(ctx.currentTime + 0.25);
        } catch (e) {}
      };
      beep();
      audioRef.current = setInterval(beep, 600);
    } catch (e) {}
  };
  const stopBeep = () => {
    try {
      if (audioRef.current) { clearInterval(audioRef.current); audioRef.current = null; }
      // 컨텍스트는 닫지 않고 유지 (다음 알람에서 즉시 재사용)
    } catch (e) {}
  };
  const startVibrate = () => {
    if (!navigator.vibrate) return;
    navigator.vibrate([400, 200, 400]);
    vibrateRef.current = setInterval(() => navigator.vibrate([400, 200, 400]), 1200);
  };
  const stopVibrate = () => {
    if (vibrateRef.current) clearInterval(vibrateRef.current);
    vibrateRef.current = null;
    if (navigator.vibrate) navigator.vibrate(0);
  };

  const triggerAlarm = (alarm) => {
    const p = pickNextProblem(alarm.difficulty);
    setProblem(p);
    setRinging(alarm);
    setCode(""); setAttempt(0); setFeedback(""); setHintLevel(0);
    setFinished(false); setSolvedCorrectly(false); setTestStatus("");
    playBeep(); startVibrate();
  };
  const closeAlarm = () => {
    stopBeep(); stopVibrate();
    setRinging(null); setProblem(null); setCode("");
    setAttempt(0); setFeedback(""); setHintLevel(0);
    setFinished(false); setSolvedCorrectly(false); setTestStatus("");
  };

  const handleSubmit = async () => {
    if (!problem || finished || running) return;
    if (!pyReady || !pyRef.current) {
      setFeedback("Python 환경이 아직 준비되지 않았어요. 잠시만 기다려 주세요.");
      return;
    }
    setRunning(true);
    setTestStatus("테스트 실행 중...");
    const next = attempt + 1;
    const results = await runAllTests(pyRef.current, code, problem.tests);
    const allPass = results.length === problem.tests.length && results.every((r) => r.pass);
    const fb = generateFeedback(next, results, problem.tests.length);
    setAttempt(next); setFeedback(fb); setTestStatus("");
    setRunning(false);
    if (allPass) {
      setSolvedCorrectly(true); setFinished(true);
      stopBeep(); stopVibrate();
      return;
    }
    setHintLevel(Math.min(next, problem.hints.length));
    if (next >= 5) {
      setFinished(true);
      stopBeep(); stopVibrate();
    }
  };

  const addAlarm = () => {
    if (!formTime) return;
    setAlarms((prev) => [...prev, { id: Date.now(), time: formTime, difficulty: formDifficulty, enabled: true }]);
    setShowForm(false); setFormTime("07:00"); setFormDifficulty("easy");
  };
  const removeAlarm = (id) => setAlarms((prev) => prev.filter((a) => a.id !== id));
  const toggleAlarm = (id) => setAlarms((prev) => prev.map((a) => (a.id === id ? { ...a, enabled: !a.enabled } : a)));

  const diffMeta = {
    easy:   { label: "Easy",   color: "bg-emerald-100 text-emerald-700" },
    normal: { label: "Normal", color: "bg-amber-100 text-amber-700" },
    hard:   { label: "Hard",   color: "bg-rose-100 text-rose-700" },
  };

  if (ringing && problem) {
    return (
      <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end justify-center">
        <div className="w-full max-w-[390px] h-[100dvh] overflow-y-auto bg-gradient-to-b from-rose-50 to-white flex flex-col">
          {/* 헤더 */}
          <div className={`flex items-center gap-2 px-4 pt-4 pb-3 ${!finished ? "animate-pulse" : ""}`}>
            <div className={`w-9 h-9 rounded-xl flex items-center justify-center text-white shadow-lg ${finished ? (solvedCorrectly ? "bg-emerald-500" : "bg-gray-400") : "bg-rose-500"}`}>
              {finished ? (solvedCorrectly ? <CheckCircle2 size={18} /> : <BellOff size={18} />) : <Bell size={18} />}
            </div>
            <div className="flex-1">
              <p className={`text-xs font-bold ${finished ? "text-gray-500" : "text-rose-500"}`}>
                {finished ? (solvedCorrectly ? "정답! 알람이 해제되었어요" : "5회 시도 종료 — 알람 해제") : "알람 울리는 중 — 문제를 풀어야 해제돼요"}
              </p>
              <p className="text-sm font-bold text-gray-800">{ringing.time} · {diffMeta[ringing.difficulty].label}</p>
            </div>
            {!finished && soundEnabled && <Volume2 size={18} className="text-rose-400" />}
          </div>

          <div className="flex-1 overflow-y-auto px-4 pb-4 space-y-3">
            {!pyReady && (
              <div className="bg-amber-50 rounded-2xl p-3 border border-amber-200 flex items-center gap-2">
                <Loader2 size={16} className="text-amber-500 animate-spin" />
                <p className="text-xs text-amber-700 font-bold">Python 환경 준비 중... (최초 1회, 약 5~15초)</p>
              </div>
            )}

            <div className="bg-white rounded-2xl shadow-md p-4 border border-gray-100">
              <p className="text-xs text-indigo-500 font-bold mb-1">📘 문제</p>
              <h3 className="text-base font-bold text-gray-800 mb-2">{problem.title}</h3>
              <p className="text-sm text-gray-700 leading-relaxed mb-3">{problem.description}</p>
              <div className="space-y-2 text-xs">
                <div className="bg-gray-50 rounded-lg p-2">
                  <p className="font-bold text-gray-500 mb-1">입력 형식</p>
                  <p className="text-gray-700">{problem.inputFormat}</p>
                </div>
                <div className="bg-gray-50 rounded-lg p-2">
                  <p className="font-bold text-gray-500 mb-1">출력 형식</p>
                  <p className="text-gray-700">{problem.outputFormat}</p>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div className="bg-indigo-50 rounded-lg p-2">
                    <p className="font-bold text-indigo-500 mb-1">예제 입력</p>
                    <pre className="text-gray-800 whitespace-pre-wrap font-mono text-[11px]">{problem.tests[0].input || "(없음)"}</pre>
                  </div>
                  <div className="bg-emerald-50 rounded-lg p-2">
                    <p className="font-bold text-emerald-600 mb-1">예제 출력</p>
                    <pre className="text-gray-800 whitespace-pre-wrap font-mono text-[11px]">{problem.tests[0].output}</pre>
                  </div>
                </div>
                <p className="text-[10px] text-gray-400 italic">예제 1개 + 숨김 9개 테스트케이스 모두 통과해야 정답!</p>
              </div>
            </div>

            {!finished && (
              <div className="bg-white rounded-2xl shadow-md p-3 border border-gray-100">
                <div className="flex items-center justify-between mb-2">
                  <p className="text-xs font-bold text-gray-600">제출 코드 (Python)</p>
                  <span className="text-[10px] text-gray-400">시도 {attempt}/5</span>
                </div>
                <textarea
                  value={code}
                  onChange={(e) => setCode(e.target.value)}

                  className="w-full h-32 p-2 rounded-lg border border-gray-200 font-mono text-xs outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 resize-none bg-gray-50"
                />
                <button
                  onClick={handleSubmit}
                  disabled={running || !pyReady}
                  className="mt-2 w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold text-sm active:scale-95 transition disabled:opacity-50"
                >
                  {running ? <><Loader2 size={14} className="animate-spin" /> 테스트 실행 중...</> : <><Send size={14} /> 제출하기</>}
                </button>
                {testStatus && <p className="text-[11px] text-gray-500 mt-1 text-center">{testStatus}</p>}
              </div>
            )}

            {hintLevel > 0 && !finished && (
              <div className="bg-amber-50 rounded-2xl p-3 border border-amber-200">
                <div className="flex items-center gap-2 mb-2">
                  <Lightbulb size={16} className="text-amber-500" />
                  <p className="text-xs font-bold text-amber-700">힌트 ({hintLevel}/5)</p>
                </div>
                <ul className="text-xs text-amber-900 space-y-1 leading-relaxed">
                  {problem.hints.slice(0, hintLevel).map((h, idx) => (<li key={idx}>💡 {h}</li>))}
                </ul>
              </div>
            )}

            {feedback && !finished && (
              <div className="rounded-2xl p-3 border bg-rose-50 border-rose-200">
                <div className="flex items-center gap-2 mb-1">

                </div>
                <pre className="text-xs text-gray-700 whitespace-pre-wrap leading-relaxed font-sans">{feedback}</pre>
              </div>
            )}

            {finished && (
              <div className={`rounded-2xl p-4 border-2 ${solvedCorrectly ? "bg-emerald-50 border-emerald-300" : "bg-indigo-50 border-indigo-200"}`}>
                <div className="flex items-center gap-2 mb-2">
                  {solvedCorrectly ? <CheckCircle2 size={18} className="text-emerald-500" /> : <BookOpen size={18} className="text-indigo-500" />}

                    {solvedCorrectly ? "정답을 맞췄어요!" : "정답 공개"}

          </div>
        </div>
        <div className={`relative w-11 h-6 rounded-full transition-colors flex-shrink-0 ${soundEnabled ? "bg-indigo-500" : "bg-gray-300"}`}>
          <div
            className="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform duration-200"
            style={{ transform: soundEnabled ? "translateX(20px)" : "translateX(0px)" }}
          />
        </div>
      </button>

      <button
        onClick={() => setShowForm((s) => !s)}
        className="w-full flex items-center justify-center gap-2 py-3 mb-3 rounded-2xl bg-white border-2 border-dashed border-indigo-300 text-indigo-500 font-bold text-sm active:scale-95 transition"
      >
        {showForm ? <X size={16} /> : <Plus size={16} />}
        {showForm ? "취소" : "알람 추가"}

      {showForm && (
        <div className="bg-white rounded-2xl shadow-md p-4 mb-3 border border-gray-100 space-y-3">
          <div>
            <label className="text-xs font-bold text-gray-600 block mb-1">알람 시각</label>
            <input type="time" value={formTime} onChange={(e) => setFormTime(e.target.value)} className="w-full px-3 py-2 rounded-xl border border-gray-200 outline-none focus:border-indigo-400 text-sm" />
          </div>
          <div>
            <label className="text-xs font-bold text-gray-600 block mb-1">난이도</label>
            <div className="grid grid-cols-3 gap-2">
              {["easy", "normal", "hard"].map((d) => (
                <button key={d} onClick={() => setFormDifficulty(d)} className={`py-2 rounded-xl text-xs font-bold transition ${formDifficulty === d ? "bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow" : "bg-gray-100 text-gray-500"}`}>
                  {diffMeta[d].label}
                </button>
              ))}
            </div>
          </div>
          <button onClick={addAlarm} className="w-full py-2.5 rounded-xl bg-gradient-to-r from-rose-500 to-pink-600 text-white font-bold text-sm active:scale-95">저장</button>
        </div>
      )}

      <div className="space-y-2 mb-4">
        {alarms.length === 0 ? (
          <div className="text-center py-8 text-gray-300 text-sm">등록된 알람이 없어요</div>
        ) : (
          alarms.map((a) => (
            <div key={a.id} className={`bg-white rounded-2xl shadow-sm p-3 flex items-center gap-3 border ${a.enabled ? "border-gray-100" : "border-gray-100 opacity-50"}`}>
              <button onClick={() => toggleAlarm(a.id)} className={`w-10 h-10 rounded-xl flex items-center justify-center ${a.enabled ? "bg-rose-500 text-white" : "bg-gray-200 text-gray-400"}`}>
                {a.enabled ? <Bell size={16} /> : <BellOff size={16} />}
              </button>
              <div className="flex-1">
                <p className="text-lg font-black text-gray-800 leading-none">{a.time}</p>
                <span className={`inline-block mt-1 text-[10px] px-2 py-0.5 rounded-full font-bold ${diffMeta[a.difficulty].color}`}>{diffMeta[a.difficulty].label}</span>
              </div>
              <button onClick={() => removeAlarm(a.id)} className="w-8 h-8 rounded-lg bg-rose-50 text-rose-500 flex items-center justify-center"><Trash2 size={14} /></button>
            </div>
          ))
        )}
      </div>

      <div className="bg-indigo-50 rounded-2xl p-3 mb-4 border border-indigo-100">
        <div className="flex items-center gap-2 mb-1"><Zap size={14} className="text-indigo-500" /><p className="text-xs font-bold text-indigo-700">동작 방식</p></div>
        <p className="text-[11px] text-indigo-900 leading-relaxed">
          설정한 시각이 되면 음성·진동 알람이 울리고, 난이도별 파이썬 문제가 매번 다르게 출제돼요.
          10개 테스트케이스(예제 1 + 숨김 9)를 모두 통과하거나 5회 시도를 모두 사용하면 알람이 해제되고
          모범 답안·풀이가 공개돼요.
        </p>
      </div>
    </div>
  );
};

function loadStorage(nickname){try{return JSON.parse(localStorage.getItem(scopedLocalKey(STORAGE_KEY,nickname))||"{}")}catch{return{}}}
function saveStorage(nickname,d){try{localStorage.setItem(scopedLocalKey(STORAGE_KEY,nickname),JSON.stringify(d))}catch{}}
function getTodayStr(){return new Date().toISOString().slice(0,10);}

// ── 수정2: 연속 출석 버그 수정 ──
// 오늘 이미 출석한 경우 → prev 그대로 유지
// 어제 출석한 경우 → prev+1 (연속)
// 그 외 → 1 (새로 시작)
function calcStreak(lastDate, prev){
  const today=getTodayStr();
  if(lastDate===today) return prev;          // 이미 오늘 기록됨 → 변경 없음
  const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
  return lastDate===yest ? prev+1 : 1;       // 어제 출석 → +1, 아니면 → 1
}

function fmtTime(ms){return String(Math.floor(ms/60000)).padStart(2,"0")+":"+String(Math.floor((ms%60000)/1000)).padStart(2,"0");}

let _py=null;
async function initPy(setStatus){
  if(_py){setStatus("ready");return;}
  if(window._sharedPyodide){_py=window._sharedPyodide;setStatus("ready");return;}
  setStatus("loading");
  try{
    _py = await ensurePyodide();
    setStatus("ready");
  }catch{setStatus("error");}
}
async function gradeCode(src,testCases){
  return await Promise.all(testCases.map(async(tc,i)=>{
    const lines=tc.input?tc.input.split("\n").map(l=>`"${l.replace(/"/g,'\\"')}"`):[];
    const w=`
import sys,builtins
from io import StringIO
_b=StringIO();sys.stdout=_b
_l=iter([${lines.join(",")}]);builtins.input=lambda p="":next(_l)
try:
    exec(${JSON.stringify(src)})
except StopIteration:pass
except Exception as e:
    sys.stdout=sys.__stdout__;raise e
sys.stdout=sys.__stdout__;_b.getvalue().strip()`;
    try{const r=await _py.runPythonAsync(w);const a=String(r??"").trim();return{index:i+1,input:tc.input,expected:tc.expected.trim(),actual:a,passed:a===tc.expected.trim(),errorMsg:null};}
    catch(e){return{index:i+1,input:tc.input,expected:tc.expected.trim(),actual:"",passed:false,errorMsg:String(e.message??e)};}
  }));
}
function parseFeedback(results){
  const fe=results.find(r=>r.errorMsg),ff=results.find(r=>!r.passed);
  if(fe){const e=fe.errorMsg;
    if(e.includes("SyntaxError"))return{title:"문법 오류 (SyntaxError)",body:"콜론(:), 괄호, 따옴표 등이 빠지지 않았는지 확인해보세요."};
    if(e.includes("IndentationError"))return{title:"들여쓰기 오류",body:"블록 안 코드는 반드시 4칸 들여쓰기가 필요해요."};
    if(e.includes("NameError"))return{title:"정의되지 않은 변수 (NameError)",body:"변수 이름의 철자를 확인하거나 먼저 선언해보세요."};
    if(e.includes("TypeError"))return{title:"자료형 불일치 (TypeError)",body:"숫자 계산 시 int() 또는 float()로 변환이 필요할 수 있어요."};
    if(e.includes("ValueError"))return{title:"값 변환 실패 (ValueError)",body:"int()에 숫자가 아닌 값이 들어갔는지 확인해보세요."};
    if(e.includes("ZeroDivisionError"))return{title:"0으로 나누었어요",body:"나누는 값이 0이 되는 경우를 예외 처리해야 해요."};
    return{title:"실행 중 오류가 발생했어요",body:"상세 에러를 참고해서 코드를 수정해보세요."};
  }
  if(ff){const{actual,expected}=ff;
    if(actual==="")return{title:"아무것도 출력되지 않았어요",body:"print()로 결과를 출력하고 있는지 확인해보세요."};
    if(actual.trim()===expected.trim()&&actual!==expected)return{title:"공백·줄바꿈 차이가 있어요",body:"출력 끝에 여분의 공백이나 줄바꿈이 있을 수 있어요."};
    if(actual.toLowerCase()===expected.toLowerCase())return{title:"대소문자가 달라요",body:`기대값은 "${expected}"예요.`};
    return{title:"출력값이 달라요",body:`기대: "${expected}" / 실제: "${actual}"`};
  }
  return null;
}

// ══ 모달: 하트 충전 ══
function HeartRechargeModal({lives,nextRechargeAt,onClose}){
  const [t,setT]=useState(Math.max(0,nextRechargeAt-Date.now()));
  useEffect(()=>{const id=setInterval(()=>setT(Math.max(0,nextRechargeAt-Date.now())),1000);return()=>clearInterval(id);},[nextRechargeAt]);
  return(<div className="fixed inset-0 bg-black/45 z-50 flex items-end justify-center" onClick={onClose}>
    <div className="w-full max-w-sm bg-white rounded-t-3xl p-6 pb-10 animate-fadeIn" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between mb-5"><p className="font-bold text-gray-800 text-lg">❤️ 하트 충전 현황</p><button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center">✕</button></div>
      <div className="flex justify-center gap-3 mb-5">{[...Array(MAX_LIVES)].map((_,i)=><span key={i} style={{fontSize:28,opacity:i<lives?1:0.2}}>❤️</span>)}</div>
      {lives<MAX_LIVES?(<><div className="bg-red-50 border border-red-200 rounded-2xl p-4 text-center mb-3"><p className="text-sm text-red-500 mb-1">다음 하트 충전까지</p><p className="text-4xl font-bold text-red-500 font-mono">{fmtTime(t)}</p></div><p className="text-xs text-gray-400 text-center">하트는 <b>2분마다 1개씩</b> 자동으로 충전됩니다.</p></>)
      :(<div className="bg-green-50 border border-green-200 rounded-2xl p-4 text-center"><p className="text-green-600 font-bold">❤️ 하트가 모두 충전됐어요!</p></div>)}
      <button onClick={onClose} className="mt-5 w-full py-3.5 rounded-2xl bg-blue-500 text-white font-bold">확인</button>
    </div></div>);
}

function StreakCalendarModal({streak,attendanceDates,onClose}){
  const today=new Date();
  const [vy,setVy]=useState(today.getFullYear());
  const [vm,setVm]=useState(today.getMonth());
  const attendSet=new Set(attendanceDates),todayStr=getTodayStr();
  const firstDay=new Date(vy,vm,1).getDay(),dim=new Date(vy,vm+1,0).getDate();
  const pv=()=>{if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1);};
  const nx=()=>{if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1);};
  const days=[];for(let i=0;i<firstDay;i++)days.push(null);for(let d=1;d<=dim;d++)days.push(d);
  return(<div className="fixed inset-0 bg-black/45 z-50 flex items-end justify-center" onClick={onClose}>
    <div className="w-full max-w-sm bg-white rounded-t-3xl p-6 pb-10 max-h-[85vh] overflow-y-auto animate-fadeIn" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between mb-4"><p className="font-bold text-gray-800 text-lg">🔥 출석 캘린더</p><button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center">✕</button></div>
      <div className="bg-orange-50 border border-orange-200 rounded-2xl px-4 py-3 mb-4 flex items-center gap-3"><span className="text-3xl">🔥</span><div><p className="font-bold text-orange-600 text-xl">{streak}일 연속 출석</p><p className="text-xs text-orange-500">총 {attendanceDates.length}일 출석</p></div></div>
      <div className="flex items-center justify-between mb-3"><button onClick={pv} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">‹</button><p className="font-bold text-gray-700">{vy}년 {vm+1}월</p><button onClick={nx} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">›</button></div>
      <div className="grid grid-cols-7 mb-1">{["일","월","화","수","목","금","토"].map(d=><div key={d} className="w-9 h-9 flex items-center justify-center text-xs text-gray-400 mx-auto font-medium">{d}</div>)}</div>
      <div className="grid grid-cols-7 gap-y-1">{days.map((d,i)=>{if(!d)return <div key={i}/>;const ds=`${vy}-${String(vm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;const att=attendSet.has(ds),isT=ds===todayStr;return <div key={i} className={`w-9 h-9 flex items-center justify-center rounded-full mx-auto text-sm font-semibold ${att?"bg-orange-400 text-white":"text-gray-500"} ${isT?"ring-2 ring-blue-400 ring-offset-1":""}`}>{d}</div>;})}</div>
      <div className="flex items-center gap-4 mt-4 text-xs text-gray-500"><div className="flex items-center gap-1.5"><span className="w-4 h-4 rounded-full bg-orange-400 inline-block"/>출석일</div><div className="flex items-center gap-1.5"><span className="w-4 h-4 rounded-full border-2 border-blue-400 inline-block"/>오늘</div></div>
      <button onClick={onClose} className="mt-5 w-full py-3.5 rounded-2xl bg-orange-500 text-white font-bold">닫기</button>
    </div></div>);
}

function LearningTrackerFeatureCore({nickname,avatar,setAvatar,syncLoadedAvatar,onHome}){
  const saved=loadStorage(nickname);
  const [view,setView]=useState("home");
  const [selectedStage,setSelectedStage]=useState(null);
  const [selectedProblem,setSelectedProblem]=useState(null);
  const [code,setCode]=useState("");
  const [gradeResults,setGradeResults]=useState(null);
  const [showHint,setShowHint]=useState(false);
  const [pyStatus,setPyStatus]=useState("idle");
  const [isRetry,setIsRetry]=useState(false);
  const [showHeartModal,setShowHeartModal]=useState(false);
  const [showCalendar,setShowCalendar]=useState(false);
  const [showSolvedList,setShowSolvedList]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const [showProfileEdit,setShowProfileEdit]=useState(false);
  const [streak,setStreak]=useState(saved.streak||0);
  const [lastDate,setLastDate]=useState(saved.lastDate||"");
  const [attendanceDates,setAttendanceDates]=useState(saved.attendanceDates||[]);
  const [xp,setXp]=useState(saved.xp??0);
  const [level,setLevel]=useState(saved.level??1);
  const [lives,setLives]=useState(saved.lives??MAX_LIVES);
  const [nextRechargeAt,setNextRechargeAt]=useState(saved.nextRechargeAt||0);
  const [solvedMap,setSolvedMap]=useState(saved.solvedMap||{});
  const [submissionHistory,setSubmissionHistory]=useState(saved.submissionHistory||{});
  const taRef=useRef(null);
  const [learningCloudReady,setLearningCloudReady]=useState(false);
  const attendanceAppliedRef=useRef("");
  const applyLearningState=(data={})=>{
    const next={...defaultLearningState(nickname),...data};
    setStreak(next.streak||0);
    setLastDate(next.lastDate||"");
    setAttendanceDates(Array.isArray(next.attendanceDates)?next.attendanceDates:[]);
    setXp(next.xp??0);
    setLevel(next.level??1);
    setLives(next.lives??MAX_LIVES);
    setNextRechargeAt(next.nextRechargeAt||0);
    setSolvedMap(next.solvedMap||{});
    setSubmissionHistory(next.submissionHistory||{});
    syncLoadedAvatar(next.avatar||DEFAULT_PROFILE_AVATAR);
  };

  useEffect(()=>{initPy(setPyStatus);},[]);
  useEffect(()=>{
    let alive=true;
    setLearningCloudReady(false);
    const fallback={...defaultLearningState(nickname),...loadStorage(nickname)};
    cloudGet(["users", nickname || "guest", "learning"], null).then(data=>{
      if(!alive) return;
      applyLearningState(data || fallback);
      setView("home");
      setSelectedStage(null);
      setSelectedProblem(null);
      setCode("");
      setGradeResults(null);
    }).finally(()=>{if(alive)setLearningCloudReady(true);});
    return()=>{alive=false;};
  },[nickname]);

  useEffect(()=>{
    if(!learningCloudReady)return;
    const key=nickname||"guest";
    if(attendanceAppliedRef.current===key)return;
    attendanceAppliedRef.current=key;
    const today=getTodayStr();
    if(lastDate!==today){
      setStreak(prev=>calcStreak(lastDate,prev));
      setLastDate(today);
      setAttendanceDates(prev=>prev.includes(today)?prev:[...prev,today]);
    }
  },[learningCloudReady,nickname,lastDate]);

  useEffect(()=>{if(lives>=MAX_LIVES)return;const id=setInterval(()=>{if(Date.now()>=nextRechargeAt){setLives(prev=>{const nl=Math.min(MAX_LIVES,prev+1);if(nl<MAX_LIVES)setNextRechargeAt(Date.now()+HEART_RECHARGE_MS);else setNextRechargeAt(0);return nl;});}}  ,1000);return()=>clearInterval(id);},[lives,nextRechargeAt]);
  useEffect(()=>{setLevel(Math.floor(xp/TOTAL_XP)+1);},[xp]);
  useEffect(()=>{const next={...solvedMap};let c=false;STAGES.forEach((s,i)=>{if(!next[`stage_${i}_done`]&&s.problems.every(p=>next[p.id])){next[`stage_${i}_done`]=true;c=true;}});if(c)setSolvedMap(next);},[solvedMap]);
  useEffect(()=>{
    const data={solvedMap,xp,level,lives,streak,lastDate,nextRechargeAt,attendanceDates,submissionHistory,nickname,avatar,profileDone:true};
    saveStorage(nickname,data);
    if(!learningCloudReady)return;
    const id=setTimeout(()=>cloudPut(["users", nickname || "guest", "learning"], {...data, updatedAt:cloudNow()}),450);
    return()=>clearTimeout(id);
  },[solvedMap,xp,level,lives,streak,lastDate,nextRechargeAt,attendanceDates,submissionHistory,nickname,avatar,learningCloudReady]);

  const openProblem=(prob)=>{setIsRetry(!!solvedMap[prob.id]);setSelectedProblem(prob);setCode("");setGradeResults(null);setShowHint(false);setView("problem");};

  const handleSubmit=async()=>{
    if(!code.trim()||pyStatus!=="ready"||lives<=0)return;
    setGradeResults(null);setView("grading");
    const results=await gradeCode(code,selectedProblem.testCases);
    setGradeResults(results);
    const allPassed=results.every(r=>r.passed);
    setSubmissionHistory(prev=>{const pl=prev[selectedProblem.id]||[];return{...prev,[selectedProblem.id]:[...pl,{code,results,passed:allPassed,submittedAt:Date.now()}]};});
    if(allPassed){
      setSolvedMap(p=>({...p,[selectedProblem.id]:true}));
      if(!isRetry)setXp(p=>p+selectedProblem.xp);
    } else {
      setLives(prev=>{const nl=Math.max(0,prev-1);if(nl<MAX_LIVES&&nextRechargeAt===0)setNextRechargeAt(Date.now()+HEART_RECHARGE_MS);return nl;});
    }
    setView("result");
  };

  const solvedTotal=Object.keys(solvedMap).filter(k=>!k.includes("stage")).length;
  const isReady=pyStatus==="ready",noLives=lives<=0;

    </div>
    <div className="bg-orange-50 border border-orange-200 rounded-2xl px-4 py-3 mb-4"><p className="text-xs text-orange-700">🔥 오늘 ({getTodayStr()}) 출석 완료! 내일도 접속하면 {streak+1}일 연속이에요.</p></div>

    {showCalendar&&<StreakCalendarModal streak={streak} attendanceDates={attendanceDates} onClose={()=>setShowCalendar(false)}/>}
    {showSolvedList&&<SolvedListModal solvedMap={solvedMap} onClose={()=>setShowSolvedList(false)}/>}
    {showProfileEdit&&<ProfileEditModal avatar={avatar} level={level} onSave={(a)=>{setAvatar(a);setShowProfileEdit(false);}} onClose={()=>setShowProfileEdit(false)}/>}
  </div>);

  if(view==="stage"&&selectedStage)return(<div className="min-h-screen bg-gray-50 px-4 pt-5 pb-24 max-w-sm mx-auto">
    <div className="flex items-center gap-3 mb-4">

      <HeartBar lives={lives} nextRechargeAt={nextRechargeAt} onClick={()=>setShowHeartModal(true)}/>

    <PyBanner/><NoLivesBanner/>
    <div className="bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 mb-3 flex items-center gap-2"><span>💡</span><p className="text-xs text-blue-600">완료된 문제도 재풀이 가능해요. 재풀이 시 XP는 지급되지 않아요.</p></div>

          {r.errorMsg&&<details className="mt-2 ml-5"><summary className="text-xs text-red-500 font-medium cursor-pointer">🚨 상세 에러 보기</summary><pre className="mt-1 text-xs text-red-700 bg-red-100 rounded-lg p-2 overflow-x-auto whitespace-pre-wrap break-all">{r.errorMsg}</pre></details>}
        </div>))}
      </div>
      <div className="flex flex-col gap-3">
        {allPassed?<button onClick={()=>{setView("stage");setCode("");setGradeResults(null);}} className="w-full py-4 rounded-2xl bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold text-base shadow-lg flex items-center justify-center gap-2">› 다음 문제 풀기</button>
        :<button onClick={()=>{setView("problem");setGradeResults(null);}} disabled={noLives} className={`w-full py-4 rounded-2xl text-white font-bold text-base shadow-lg flex items-center justify-center gap-2 ${noLives?"bg-gray-300 cursor-not-allowed":"bg-gradient-to-r from-blue-500 to-blue-600"}`}>{noLives?"💔 하트 충전 후 재도전":"🔄 다시 풀기"}</button>}
        <button onClick={()=>setView("stage")} className="w-full py-3 rounded-2xl border border-gray-200 bg-white text-gray-600 font-medium text-sm">문제 목록으로</button>
        <button onClick={()=>setView("home")} className="w-full py-3 rounded-2xl border border-gray-200 bg-white text-gray-500 text-sm font-medium flex items-center justify-center gap-2">🏠 홈으로 돌아가기</button>
      </div>
      {showHeartModal&&<HeartRechargeModal lives={lives} nextRechargeAt={nextRechargeAt} onClose={()=>setShowHeartModal(false)}/>}
      {showHistory&&<SubmissionHistoryModal problemId={selectedProblem.id} submissionHistory={submissionHistory} onClose={()=>setShowHistory(false)}/>}
    </div>);
  }
  return null;
}

// ── 학습추적 어댑터: 앱 로그인 닉네임을 그대로 사용하고 아바타만 내부 관리 ──
function LearningTrackerFeature({ nickname, onHome }) {
  const publicProfile = usePublicProfile(nickname);
  const [avatar, setAvatarState] = useState(() => publicProfile.avatar || DEFAULT_PROFILE_AVATAR);

  useEffect(() => {
    setAvatarState(publicProfile.avatar || DEFAULT_PROFILE_AVATAR);
  }, [nickname, publicProfile.avatar]);

  const setAvatar = (nextAvatar) => {
    const avatarValue = cleanProfileAvatar(nextAvatar);
    setAvatarState(avatarValue);
    savePublicProfile(nickname, { avatar: avatarValue });
  };

  const syncLoadedAvatar = (nextAvatar) => {
    const cachedProfile = readCachedPublicProfile(nickname);
    const avatarValue = cachedProfile.updatedAt ? cachedProfile.avatar : cleanProfileAvatar(nextAvatar);
    setAvatarState(avatarValue);
    if (!cachedProfile.updatedAt && nextAvatar) {
      savePublicProfile(nickname, { avatar: avatarValue });
    }
  };

  return (
    <LearningTrackerFeatureCore
      nickname={nickname}
      avatar={avatar}
      setAvatar={setAvatar}
      syncLoadedAvatar={syncLoadedAvatar}
      onHome={onHome}
    />
  );
}

    function extractTags(text) {
      const lower = text.toLowerCase();
      const found = KW_MAP.filter(([,keys]) => keys.some(k => lower.includes(k))).map(([t]) => t).slice(0, 3);
      return found.length > 0 ? found : [text.split(/\s+/)[0].replace(/[^가-힣a-zA-Z0-9]/g, "").slice(0, 10) || "뉴스"];
    }

    function parseNewsTimeMs(value, fallbackOffsetMs = 0) {
      if (!value) return Date.now() - fallbackOffsetMs;
      const direct = new Date(value);
      if (!isNaN(direct)) return direct.getTime();
      const legacy = String(value).trim().match(/^(\d+)\s*(초|분|시간|일|주)\s*전$/);
      if (!legacy) return Date.now() - fallbackOffsetMs;
      const unitMs = { "초": 1000, "분": 60000, "시간": 3600000, "일": 86400000, "주": 604800000 };
      return Date.now() - Number(legacy[1]) * unitMs[legacy[2]];
    }

    function formatNewsTime(value, fallbackOffsetMs = 0) {
      const d = new Date(parseNewsTimeMs(value, fallbackOffsetMs));
      const parts = new Intl.DateTimeFormat("ko-KR", {
        timeZone: "Asia/Seoul",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).formatToParts(d).reduce((acc, part) => {
        if (part.type !== "literal") acc[part.type] = part.value;
        return acc;
      }, {});
      const now = new Intl.DateTimeFormat("ko-KR", {
        timeZone: "Asia/Seoul",
        year: "numeric",
      }).formatToParts(new Date()).find((part) => part.type === "year")?.value;
      const dateText = parts.year === now ? `${parts.month}.${parts.day}` : `${parts.year}.${parts.month}.${parts.day}`;
      return `${dateText} ${parts.hour}:${parts.minute}`;
    }

    function extractRealUrl(el) {
      const linkEl = el.getElementsByTagName("link")[0];
      if (linkEl && linkEl.textContent && linkEl.textContent.startsWith("http")) {
        return linkEl.textContent.trim();
      }
      const guid = el.getElementsByTagName("guid")[0]?.textContent?.trim();
      if (guid && guid.startsWith("http")) return guid;
      return "#";
    }

    function parseRSS(xmlStr, cat) {
      const doc = new DOMParser().parseFromString(xmlStr, "text/xml");
      const items = Array.from(doc.getElementsByTagName("item"));
      
      const validNews = [];
      let i = 0;
      
      for (const el of items) {
        const raw = el.getElementsByTagName("title")[0]?.textContent?.trim() || "";
        if (!raw) continue; 
        
        const url = extractRealUrl(el);
        let isValid = url !== "#";
        
        if (isValid) {
          try {
            const parsed = new URL(url);
            if (parsed.pathname.length <= 1 && !parsed.search) {
              isValid = false;
            }
          } catch(e) {
            isValid = false;
          }
        }
        
        if (isValid) {
          const srcEl = el.getElementsByTagName("source")[0];
          const src = srcEl?.textContent?.trim() || (raw.includes(" - ") ? raw.split(" - ").pop().trim() : "뉴스");
          const title = raw.includes(" - ") ? raw.split(" - ").slice(0, -1).join(" - ").trim() : raw;
          const pub = el.getElementsByTagName("pubDate")[0]?.textContent;
          const rawDesc = (el.getElementsByTagName("description")[0]?.textContent || "")
            .replace(/&lt;[^&]*&gt;/g, "").replace(/<[^>]*>/g, "")
            .replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&nbsp;/g, " ")
            .trim();
            
          validNews.push({
            id: `${cat}${i}${Date.now()}`, cat, hot: i < 2,
            src: src.slice(0, 24), time: formatNewsTime(pub, i * 60000),
            timestamp: pub ? new Date(pub).getTime() : Date.now() - i * 60000,
            tags: extractTags(title), title: title || "뉴스",
            body: rawDesc || "본문 요약이 제공되지 않았습니다.",
            url: url,
          });
          i++;
        }
        
        if (validNews.length >= 40) break;
      }
      
      return validNews;
    }

    async function fetchWithFallback(cat) {
      const rssUrl = FEEDS[cat];
      const shuffledProxies = [...PROXIES].sort(() => Math.random() - 0.5);

      for (const proxy of shuffledProxies) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 3500); 
          
          const res = await fetch(proxy.build(rssUrl), { signal: controller.signal });
          clearTimeout(timeoutId);
          
          if (res.ok) {
            const text = await res.text();
            if (text && text.length > 100 && text.includes("<rss")) {
              const items = parseRSS(text, cat);
              if (items.length > 0) return { items, source: "live", proxy: proxy.name };
            }
          }
        } catch (e) {
        }
      }

      console.warn(`[NewsFeature] ${cat} 모든 프록시 응답 실패. Mock 데이터를 제공합니다.`);
      const mockItems = (MOCK[cat] || []).map((m, i) => {
        const timestamp = parseNewsTimeMs(m.time, i * 3600000);
        return { ...m, timestamp, time: formatNewsTime(m.time, i * 3600000) };
      });
      return { items: mockItems, source: "mock", proxy: "none" };
    }

    const NEWS_FEED_CACHE_KEY = "everymcu-news-feed-cache-v3";
    const NEWS_FEED_REFRESH_MS = 10 * 60 * 1000;
    let newsFeedMemoryCache = null;

    function normalizeNewsFeedSnapshot(snapshot) {
      const cache = snapshot?.cache && typeof snapshot.cache === "object" ? snapshot.cache : {};
      const meta = snapshot?.meta && typeof snapshot.meta === "object" ? snapshot.meta : {};
      return { cache, meta, savedAt: snapshot?.savedAt || 0 };
    }

    function readNewsFeedSnapshot() {
      if (newsFeedMemoryCache) return newsFeedMemoryCache;
      newsFeedMemoryCache = normalizeNewsFeedSnapshot(readLocalJson(NEWS_FEED_CACHE_KEY, null));
      return newsFeedMemoryCache;
    }

    function writeNewsFeedSnapshot(cache, meta) {
      newsFeedMemoryCache = { cache, meta, savedAt: Date.now() };
      writeLocalJson(NEWS_FEED_CACHE_KEY, newsFeedMemoryCache);
    }

    function hasCachedNews(cache, cat) {
      return Array.isArray(cache?.[cat]) && cache[cat].length > 0;
    }

    function isNewsCacheFresh(meta, cat) {
      const fetchedAt = new Date(meta?.[cat]?.fetchedAt || 0).getTime();
      return fetchedAt && Date.now() - fetchedAt < NEWS_FEED_REFRESH_MS;
    }

    /* ══ 메인 컴포넌트 ══════════════════════════════════════════════ */
    function NewsFeature({ nickname, onHome }) {
      const initialNewsRef = useRef(null);
      if (!initialNewsRef.current) initialNewsRef.current = readNewsFeedSnapshot();
      const [tab,       setTab]       = useState("전체");
      const [cache,     setCache]     = useState(() => initialNewsRef.current.cache);
      const [meta,      setMeta]      = useState(() => initialNewsRef.current.meta);
      const [loading,   setLoading]   = useState({});
      const [refreshing,setRefreshing]= useState({});
      const [readSet,   setReadSet]   = useState(new Set());
      const [likes,     setLikes]     = useState({});
      const [bmks,      setBmks]      = useState({});
      const [kwFilter,  setKwFilter]  = useState(null);
      const [trendOpen, setTrendOpen] = useState(true);
      const [newsCloudReady, setNewsCloudReady] = useState(false);
      const fetchingRef = useRef(new Set());
      const cacheRef = useRef(initialNewsRef.current.cache);
      const metaRef = useRef(initialNewsRef.current.meta);

      useEffect(() => { cacheRef.current = cache; }, [cache]);
      useEffect(() => { metaRef.current = meta; }, [meta]);

      const doFetch = useCallback(async (cat, options = {}) => {
        if (fetchingRef.current.has(cat)) return;
        const hasCache = hasCachedNews(cacheRef.current, cat);
        const showSkeleton = !hasCache && !options.silent;
        fetchingRef.current.add(cat);
        if (showSkeleton) setLoading(p => ({ ...p, [cat]: true }));
        else setRefreshing(p => ({ ...p, [cat]: true }));
        try {
          const { items, source, proxy } = await fetchWithFallback(cat);
          let nextCache = cacheRef.current;
          setCache(p => {
            nextCache = { ...p, [cat]: items };
            cacheRef.current = nextCache;
            return nextCache;
          });
          setMeta(p => {
            const nextMeta = { ...p, [cat]: { source, proxy, fetchedAt: cloudNow() } };
            metaRef.current = nextMeta;
            writeNewsFeedSnapshot(nextCache, nextMeta);
            return nextMeta;
          });
        } finally {
          fetchingRef.current.delete(cat);
          setLoading(p => ({ ...p, [cat]: false }));
          setRefreshing(p => ({ ...p, [cat]: false }));
        }
      }, []);

      const refreshCat = useCallback((cat) => {
        doFetch(cat, { silent: true });
      }, [doFetch]);

      useEffect(() => {
        const fetchAll = async () => {
          const categories = Object.keys(FEEDS);
          const needsRefresh = categories.some(cat => !hasCachedNews(cacheRef.current, cat) || !isNewsCacheFresh(metaRef.current, cat));
          if (!needsRefresh) return;
          for (const cat of categories) {
            doFetch(cat, { silent: hasCachedNews(cacheRef.current, cat) });
            await new Promise(r => setTimeout(r, 250));
          }
        };
        fetchAll();
      }, [doFetch]);

      useEffect(() => { 
        if (tab === "AI추천" || tab === "전체") return;
        if (!hasCachedNews(cache, tab)) doFetch(tab);
        else if (!isNewsCacheFresh(meta, tab)) doFetch(tab, { silent: true });
      }, [tab, cache, meta, doFetch]);

      useEffect(() => {
        let alive = true;
        setNewsCloudReady(false);
        cloudGet(["users", nickname || "guest", "newsState"], null).then(data => {
          if (!alive) return;
          setReadSet(new Set(Array.isArray(data?.readIds) ? data.readIds : []));
          setLikes(data?.likes || {});
          setBmks(data?.bmks || {});
        }).finally(() => { if (alive) setNewsCloudReady(true); });
        return () => { alive = false; };
      }, [nickname]);

      useEffect(() => {
        if (!newsCloudReady) return;
        const id = setTimeout(() => {
          cloudPut(["users", nickname || "guest", "newsState"], {
            readIds: Array.from(readSet),
            likes,
            bmks,
            updatedAt: cloudNow(),
          });
        }, 350);
        return () => clearTimeout(id);
      }, [newsCloudReady, nickname, readSet, likes, bmks]);

      const trending = useMemo(() => {
        const all = Object.values(cache).flat();
        if (!all.length) return [];
        const freq = {};
        all.forEach(n => n.tags.forEach(t => { freq[t] = (freq[t] || 0) + 1; }));
        return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([kw], i) => ({ rank: i + 1, kw }));
      }, [cache]);

      const recs = useMemo(() => {
        if (!readSet.size) return [];
        const all  = Object.values(cache).flat();
        const freq = {};
        all.filter(n => readSet.has(n.id)).forEach(n => n.tags.forEach(t => { freq[t] = (freq[t] || 0) + 1; }));
        return all.filter(n => !readSet.has(n.id))
          .map(n => ({ ...n, score: n.tags.reduce((s, t) => s + (freq[t] || 0), 0) }))
          .filter(n => n.score > 0).sort((a, b) => b.score - a.score).slice(0, 15);
      }, [readSet, cache]);

      const interest = useMemo(() => {
        if (!readSet.size) return [];
        const freq = {};
        Object.values(cache).flat().filter(n => readSet.has(n.id))
          .forEach(n => n.tags.forEach(t => { freq[t] = (freq[t] || 0) + 1; }));
        return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 6);
      }, [readSet, cache]);

      const norm   = s => s.toLowerCase().replace(/\s/g, "");
      const kwList = useMemo(() => {
        if (!kwFilter) return [];
        const kw = norm(kwFilter);
        return Object.values(cache).flat()
          .filter(n => n.tags.some(t => norm(t).includes(kw) || kw.includes(norm(t))));
      }, [kwFilter, cache]);

      // ✨ 수정됨: 모든 일반 카테고리와 검색 결과에 대해 최신순(timestamp) 정렬 적용
      const displayList = useMemo(() => {
        if (kwFilter) {
          return [...kwList].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }
        if (tab === "AI추천") {
          return recs; // AI추천은 맞춤형 점수순으로 노출
        }
        if (tab === "전체") {
          const allNews = Object.values(cache).flat();
          const uniqueNews = Array.from(new Map(allNews.map(item => [item.id, item])).values());
          return uniqueNews.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }
        // 나머지 개별 카테고리 탭도 최신순으로 정렬
        const catNews = cache[tab] || [];
        return [...catNews].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      }, [kwFilter, kwList, tab, recs, cache]);

      const isAITab     = tab === "AI추천" && !kwFilter;
      const isAllTab    = tab === "전체" && !kwFilter;
      
      const isLoadingAll = (isAllTab || isAITab) && Object.values(cache).flat().length === 0;
      const isLoadingCat = !kwFilter && !isAITab && !isAllTab && loading[tab];
      const isLoading   = isLoadingAll || isLoadingCat;
      const isRefreshing = !isLoading && !kwFilter && Object.values(refreshing).some(Boolean);

      const isMock      = !kwFilter && !isAITab && !isAllTab && meta[tab]?.source === "mock";

      const markRead   = id => setReadSet(p => new Set([...p, id]));
      const resetRead  = ()  => setReadSet(new Set());
      const toggleLike = id  => setLikes(p => ({ ...p, [id]: !p[id] }));
      const toggleBmk  = id  => setBmks(p  => ({ ...p, [id]: !p[id] }));

      return (
        <div className="flex flex-col min-h-screen w-full max-w-[390px] mx-auto font-sans shadow-xl bg-gray-50 pb-10 relative">
          
          <div className="bg-white px-4 pt-5 pb-3 border-b border-gray-100 sticky top-0 z-20">
            <div className="flex items-center justify-between">
              {kwFilter ? (
                <div className="flex items-center gap-2">
                  <button onClick={() => setKwFilter(null)}
                    className="p-1 rounded-full hover:bg-indigo-50 transition-colors"
                    style={{ background:"none", border:"none", cursor:"pointer" }}>
                    <ArrowLeft size={18} color="#6366f1" />
                  </button>
                  <div>
                    <p className="text-[11px] text-gray-400 mb-0.5">키워드 검색</p>
                    <h1 className="flex items-center gap-1 text-[17px] font-bold text-gray-900">
                      <Hash size={13} color="#6366f1" /> {kwFilter}
                    </h1>
                  </div>
                </div>
              ) : (
                <div>
                  <p className="text-[11px] text-gray-400 mb-0.5">{nickname}님을 위한</p>
                  <h1 className="text-[17px] font-bold text-gray-900 tracking-tight">AI·의료 뉴스피드</h1>
                </div>
              )}
              <div className="flex items-center gap-2">
                {!kwFilter && tab !== "AI추천" && tab !== "전체" && (
                  <button onClick={() => refreshCat(tab)}
                    className="p-2 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all"
                    style={{ border:"none", cursor:"pointer", display:"flex" }}>
                    <RefreshCw size={15} className={(loading[tab] || refreshing[tab]) ? "animate-spin" : ""} />
                  </button>
                )}
                <button onClick={onHome}
                  className="p-2 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition-all"
                  style={{ border:"none", cursor:"pointer", display:"flex" }}>
                  <Home size={15} />
                </button>
              </div>
            </div>
            <div className="flex items-center gap-1.5 mt-1">
              <div className="w-1.5 h-1.5 rounded-full flex-shrink-0"
                style={{ background: isLoading ? "#fbbf24" : isRefreshing ? "#60a5fa" : isMock ? "#f87171" : "#34d399" }} />
              <p className="text-[10px] text-gray-400">
                {kwFilter ? `관련 뉴스 ${kwList.length}건`
                  : isLoading ? "최신 뉴스 불러오는 중..."
                  : isRefreshing ? "저장된 기사 표시 중 · 새 기사 확인 중"
                  : isMock   ? "네트워크 불안정 — 샘플 데이터 표시 중"
                  : "Google News 실시간 연동"}
              </p>
            </div>
          </div>

          {isMock && !kwFilter && (
            <div className="mx-4 mt-3 bg-yellow-50 border border-yellow-200 rounded-2xl p-3 flex items-start gap-2">
              <Info size={14} className="text-yellow-600 flex-shrink-0 mt-0.5" />
              <div>
                <p className="text-[11px] font-semibold text-yellow-800 mb-0.5">실제 뉴스를 가져오지 못했어요</p>
                <p className="text-[10px] text-yellow-700 leading-relaxed">
                  프록시 서버가 일시적으로 불안정합니다. 새로고침 버튼으로 재시도할 수 있어요.
                </p>
              </div>
            </div>
          )}

          {!kwFilter && (
            <div className="mx-4 mt-3">
              <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <button onClick={() => setTrendOpen(v => !v)}
                  className="w-full flex items-center gap-2 px-4 py-3"
                  style={{ background:"none", border:"none", cursor:"pointer" }}>
                  <Flame size={14} className="text-orange-500" />
                  <span className="text-[13px] font-bold text-gray-800 flex-1 text-left">실시간 트렌딩 키워드</span>
                  <span className="text-[10px] bg-orange-50 text-orange-500 font-semibold px-2 py-0.5 rounded-full">TOP 5</span>
                  <span className="text-gray-400 text-xs ml-1">{trendOpen ? "▲" : "▼"}</span>
                </button>
                {trendOpen && (
                  <div className="px-4 pb-3 border-t border-gray-50">
                    {trending.length === 0
                      ? <p className="text-[11px] text-gray-400 py-3 text-center animate-pulse">키워드 분석 중...</p>
                      : trending.map(t => (
                        <div key={t.rank} className="flex items-center gap-3 pt-2.5">
                          <span className={`text-xs font-extrabold w-4 shrink-0 ${t.rank <= 3 ? "text-indigo-600" : "text-gray-400"}`}>
                            {t.rank}
                          </span>
                          <button onClick={() => setKwFilter(t.kw)}
                            className="text-[13px] font-semibold text-gray-800 flex-1 text-left"
                            style={{ background:"none", border:"none", cursor:"pointer", textDecoration:"underline", textDecorationColor:"#c7d2fe" }}>
                            {t.kw}
                          </button>
                          <TrendingUp size={11} className="text-red-400" />
                        </div>
                      ))}
                  </div>
                )}
              </div>
            </div>
          )}

          {!kwFilter && (
            <div className="px-4 py-3 sticky top-[72px] z-10 bg-gray-50/95 backdrop-blur-sm border-b border-gray-100/50">
              <div className="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                {NEWS_TABS.map(t => {
                  const active = tab === t;
                  const isAI   = t === "AI추천";
                  const isAll  = t === "전체";
                  const isSub  = t === "헬스테크" || t === "오픈소스";
                  
                  return (
                    <button key={t} onClick={() => setTab(t)}
                      className={`shrink-0 flex items-center gap-1 px-3.5 py-1.5 rounded-full text-[12px] font-semibold transition-all active:scale-95 ${
                        active
                          ? (isAI || isAll) ? "text-white shadow-md shadow-purple-200" : "bg-indigo-600 text-white shadow-md shadow-indigo-200"
                          : (isAI || isAll) ? "bg-purple-50 text-purple-600 border border-purple-200" : "bg-white text-gray-500 border border-gray-200"
                      }`}
                      style={{ border:"none", cursor:"pointer",
                        ...(active && (isAI || isAll) ? { background:"linear-gradient(90deg,#4f46e5,#7c3aed)" } : {}) }}>
                      {isAI && <Sparkles size={10} />}
                      {isAll && <Globe size={10} />}
                      {t}
                      {isAI && recs.length > 0 && (
                        <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full"
                          style={{ background: active ? "rgba(255,255,255,0.3)" : "#6366f1", color:"white" }}>
                          {recs.length}
                        </span>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          <div className="flex-1 px-4 mt-2 space-y-3">
            {isLoading && [1,2,3].map(k => <SkeletonCard key={k} />)}

            {isAITab && !readSet.size && (
              <div className="flex flex-col items-center mt-16 gap-3 text-center">
                <Sparkles size={40} color="#c7d2fe" />
                <p className="text-[14px] font-semibold text-gray-600">아직 읽은 뉴스가 없어요</p>
                <p className="text-[12px] text-gray-400 leading-relaxed">
                  관심 있는 뉴스 카드를 클릭해 읽어보세요.<br />조회 기록을 바탕으로 맞춤 추천을 드려요.
                </p>
                <button onClick={() => setTab("전체")}
                  className="px-5 py-2 mt-2 bg-indigo-600 text-white rounded-full text-[13px] font-semibold hover:bg-indigo-700 transition-colors"
                  style={{ border:"none", cursor:"pointer", boxShadow:"0 4px 12px rgba(79,70,229,.3)" }}>
                  뉴스 구경하러 가기
                </button>
              </div>
            )}

            {isAITab && readSet.size > 0 && (
              <div className="rounded-2xl p-4 border border-indigo-200 mb-2 shadow-sm"
                style={{ background:"linear-gradient(135deg,#eef2ff,#f5f3ff)" }}>
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-1.5">
                    <Sparkles size={13} color="#6366f1" />
                    <span className="text-[12px] font-bold text-indigo-700">나의 관심사 분석</span>
                  </div>
                  <button onClick={resetRead}
                    className="text-[10px] text-indigo-400 hover:bg-indigo-100 border border-indigo-200 rounded-full px-2.5 py-0.5 transition-colors"
                    style={{ cursor:"pointer" }}>
                    기록 초기화
                  </button>
                </div>
                <div className="flex flex-wrap gap-1.5">
                  {interest.map(([tag, cnt]) => (
                    <span key={tag} className="text-[11px] bg-white text-indigo-600 font-semibold px-2.5 py-1 rounded-full border border-indigo-100">
                      #{tag} <span className="text-indigo-300">x{cnt}</span>
                    </span>
                  ))}
                </div>
                <p className="text-[10px] text-indigo-400 mt-2.5 flex items-center gap-1">
                  <Check size={10} /> 총 {readSet.size}개의 기사를 기반으로 추천된 뉴스입니다
                </p>
              </div>
            )}

            {!isLoading && displayList.length === 0 && !(isAITab && !readSet.size) && (
              <div className="flex flex-col items-center mt-20 text-gray-400">
                <span className="text-4xl mb-3">📭</span>
                <p className="text-sm text-center">
                  {kwFilter ? `#${kwFilter} 관련 뉴스가 없습니다` : isAITab ? "새로 추천할 뉴스가 없습니다 🎉" : "불러오는 중입니다..."}
                </p>
              </div>
            )}

            {!isLoading && displayList.map(news => (
              <NewsCard key={news.id} news={news}
                isRead={readSet.has(news.id)} isRec={isAITab}
                onRead={markRead} onTag={setKwFilter}
                liked={!!likes[news.id]} bookmarked={!!bmks[news.id]}
                onLike={toggleLike} onBookmark={toggleBmk}
              />
            ))}
            
            {!isLoading && tab !== "AI추천" && !kwFilter && displayList.length > 0 && (
               <div className="py-6 text-center text-[11px] text-gray-400">
                 현재 수집된 {displayList.length}개의 최신 뉴스를 모두 확인했습니다.
               </div>
            )}
          </div>
        </div>
      );
    }

const WEEKLY_BATTLE_URL = "./weekly/";
const WeeklyStatusFeature = ({ nickname, avatar, onHome }) => {

  const [blocked, setBlocked] = useState(false);

  const activeAvatar = cleanProfileAvatar(avatar || publicProfile.avatar);

            <Home size={12} /> 홈

      {/* 본문 */}
      <div className="flex-1 relative">
        {/* 로딩 스피너 */}

            <Loader2 size={32} className="animate-spin text-violet-500" />

              <RefreshCw size={18} /> 다시 불러오기

            <p className="text-xs text-gray-400">{nickname}님, 행운을 빌어요! ⚔️</p>

          <iframe
            src={src}
            title="EveryMCU 코딩배틀"
            className="w-full h-full border-0"
            onLoad={() => { loadedRef.current = true; setLoading(false); }}
            allow="clipboard-write; fullscreen"
          />
        )}
      </div>
    </div>
  );
};

// ── 저장소 (localStorage 우선, 실패 시 인메모리 fallback — Artifacts 환경 대응) ──
const _memStore = {};
const lsGet = (k, d) => {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch {
    return k in _memStore ? _memStore[k] : d;
  }
};
const lsSet = (k, v) => {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch { _memStore[k] = v; }
};

// ── Pyodide 전역 인스턴스 (lazy load) ──

const asList = value => {
  if (Array.isArray(value)) return value.filter(Boolean);
  if (value && typeof value === 'object') return Object.values(value).filter(Boolean);
  return [];
};
const communityNowIso = () => new Date().toISOString();
const parseCommunityTimeValue = value => {
  if (value === undefined || value === null || value === '') return null;
  if (typeof value === 'number' && value > 946684800000) {
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? null : date.toISOString();
  }
  const text = String(value).trim();
  if (!text) return null;
  const direct = new Date(text);
  if (!Number.isNaN(direct.getTime())) return direct.toISOString();
  if (text === '방금' || text === '방금 전') return communityNowIso();
  const legacy = text.match(/^(\d+)\s*(초|분|시간|일|주|개월|년)\s*전$/);
  if (!legacy) return null;
  const amount = Number(legacy[1]);
  const multipliers = {
    '초': 1000,
    '분': 60 * 1000,
    '시간': 60 * 60 * 1000,
    '일': 24 * 60 * 60 * 1000,
    '주': 7 * 24 * 60 * 60 * 1000,
    '개월': 30 * 24 * 60 * 60 * 1000,
    '년': 365 * 24 * 60 * 60 * 1000,
  };
  return new Date(Date.now() - amount * multipliers[legacy[2]]).toISOString();
};
const normalizeCommunityTime = (item, fallbackOffsetMs = 0) => (
  parseCommunityTimeValue(item?.createdAt) ||
  parseCommunityTimeValue(item?.time) ||
  parseCommunityTimeValue(item?.id) ||
  new Date(Date.now() - fallbackOffsetMs).toISOString()
);
const normalizeCommunityEntry = (item, fallbackOffsetMs = 0) => {
  const createdAt = normalizeCommunityTime(item, fallbackOffsetMs);
  return { ...item, createdAt, time: createdAt };
};
const communityTimeParts = date => {
  const parts = new Intl.DateTimeFormat('ko-KR', {
    timeZone: 'Asia/Seoul',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
  }).formatToParts(date);
  return parts.reduce((acc, part) => {
    if (part.type !== 'literal') acc[part.type] = part.value;
    return acc;
  }, {});
};
const formatCommunityTime = value => {
  const parsed = parseCommunityTimeValue(value);
  if (!parsed) return value ? String(value) : '';
  const parts = communityTimeParts(new Date(parsed));
  const now = communityTimeParts(new Date());
  const dateText = parts.year === now.year ? `${parts.month}.${parts.day}` : `${parts.year}.${parts.month}.${parts.day}`;
  return `${dateText} ${parts.hour}:${parts.minute}`;
};
