const useAppNotifications = (nickname) => {
  const [notifications, setNotifications] = useState(() => {
    try { return normalizeNotifications(JSON.parse(localStorage.getItem(notificationCacheKey(nickname)) || '[]')); }
    catch { return []; }
  });
  const [loaded, setLoaded] = useState(false);

  const loadNotifications = useCallback(async () => {
    const data = await cloudGet(['users', nickname || 'guest', 'notifications'], null);
    const next = normalizeNotifications(data);
    setNotifications(next);
    setLoaded(true);
    try { localStorage.setItem(notificationCacheKey(nickname), JSON.stringify(next)); } catch {}
  }, [nickname]);

  useEffect(() => {
    let alive = true;
    const load = async () => {
      const data = await cloudGet(['users', nickname || 'guest', 'notifications'], null);
      if (!alive) return;
      const next = normalizeNotifications(data);
      setNotifications(next);
      setLoaded(true);
      try { localStorage.setItem(notificationCacheKey(nickname), JSON.stringify(next)); } catch {}
    };
    load();
    const id = setInterval(load, 7000);
    return () => { alive = false; clearInterval(id); };
  }, [nickname]);

  const markRead = (id) => {
    setNotifications(prev => {
      const next = prev.map(item => item.id === id ? { ...item, read: true } : item);
      try { localStorage.setItem(notificationCacheKey(nickname), JSON.stringify(next)); } catch {}
      return next;
    });
    cloudPatch(['users', nickname || 'guest', 'notifications', id], { read: true, readAt: cloudNow() });
  };

  const markAllRead = () => {
    const unread = notifications.filter(item => !item.read);
    if (!unread.length) return;
    const readAt = cloudNow();
    const next = notifications.map(item => ({ ...item, read: true, readAt: item.readAt || readAt }));
    setNotifications(next);
    try { localStorage.setItem(notificationCacheKey(nickname), JSON.stringify(next)); } catch {}
    unread.forEach(item => cloudPatch(['users', nickname || 'guest', 'notifications', item.id], { read: true, readAt }));
  };

  const removeNotification = (id) => {
    setNotifications(prev => {
      const next = prev.filter(item => item.id !== id);
      try { localStorage.setItem(notificationCacheKey(nickname), JSON.stringify(next)); } catch {}
      return next;
    });
    cloudDelete(['users', nickname || 'guest', 'notifications', id]);
  };

  const clearAll = () => {
    setNotifications([]);
    try { localStorage.setItem(notificationCacheKey(nickname), JSON.stringify([])); } catch {}
    cloudDelete(['users', nickname || 'guest', 'notifications']);
  };

  return {
    notifications,
    loaded,
    unreadCount: notifications.filter(item => !item.read).length,
    loadNotifications,
    markRead,
    markAllRead,
    removeNotification,
    clearAll,
  };
};

          <div className="relative rounded-2xl border-2 transition-all duration-200 overflow-hidden"

            <input type="text" value={input}
              onChange={(e) => setInput(e.target.value)}
              onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
              onKeyDown={(e) => e.key === "Enter" && handleSubmit()}

            <div className="grid grid-cols-3 gap-3">

                const Icon = tab.icon;
                return (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}

                    <span className="max-w-full truncate text-[12px] font-black leading-4 text-gray-700">{tab.label}</span>

                );
              })}
            </div>
          </div>
        ) : (
          <div className="h-full">
            <activeTabData.Component
              nickname={nickname}
              avatar={publicProfile.avatar}
              onHome={() => setActiveTab(null)}

              onCommunityTargetHandled={() => setCommunityTarget(null)}
            />
          </div>
        )}
      </main>
      {showAvatarEdit&&<ProfileEditModal avatar={publicProfile.avatar} level={avatarLevel} onSave={handleSaveHomeAvatar} onClose={()=>setShowAvatarEdit(false)}/>}
      <nav className="shrink-0 flex items-center justify-around px-2 py-2 border-t"
        style={{ background: "white", borderColor: "#e8eaf6", boxShadow: "0 -4px 20px rgba(99,102,241,0.08)", paddingBottom: "calc(0.5rem + env(safe-area-inset-bottom))" }}>
        <button onClick={() => setActiveTab(null)}
          className="flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl transition-all duration-150"
          style={{ color: activeTab === null ? "#6366f1" : "#9ca3af" }}>
          <div className="w-7 h-7 rounded-xl flex items-center justify-center" style={{ background: activeTab === null ? "#eef2ff" : "transparent" }}>
            <Home size={16} />
          </div>
          <span className="text-[10px] font-semibold">홈</span>
        </button>
        {TABS.map((tab) => {
          const Icon = tab.icon;
          const isActive = activeTab === tab.id;
          return (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
              className="flex flex-col items-center gap-0.5 px-2 py-1 rounded-xl transition-all duration-150"
              style={{ color: isActive ? "#6366f1" : "#9ca3af" }}>
              <div className="w-7 h-7 rounded-xl flex items-center justify-center" style={{ background: isActive ? "#eef2ff" : "transparent" }}>
                <Icon size={16} />
              </div>
              <span className="text-[10px] font-semibold">{tab.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
};

function App() {
  const [screen, setScreen] = useState("splash");
  const [nickname, setNickname] = useState(() => readLastNickname());
  const [claimError, setClaimError] = useState("");

  const enterWithNickname = async (name, pin) => {
    const cleanName = String(name || "").trim();
    setClaimError("");
    const result = await authenticateWithNicknamePin(cleanName, pin);
    if (!result.ok) {
      setClaimError(result.message || "로그인/회원가입에 실패했어요.");
      return false;
    }
    saveLastNickname(cleanName);
    setNickname(cleanName);
    setScreen("home");
    return true;
  };

  const handleSplashDone = async () => {
    const savedNickname = readLastNickname();
    if (!savedNickname) {
      setScreen("nickname");
      return;
    }
    setScreen("auth");
    const ok = await resumeSavedLogin(savedNickname);
    if (ok) {
      setNickname(savedNickname);
      setScreen("home");
      return;
    }
    clearCloudAuthSession();
    if (!ok) {
      forgetLastNickname();
      setNickname("");
      setScreen("nickname");
    }
  };

  const handleChangeNickname = () => {
    forgetLastNickname();
    clearCloudAuthSession();
    setNickname("");
    setClaimError("");
    setScreen("nickname");
  };

  if (screen === "splash") return <SplashScreen onNext={handleSplashDone} />;
  if (screen === "auth") {
    return (
      <div className="fixed inset-0 flex flex-col items-center justify-center gap-4 bg-[#f5f7ff] px-8 text-center">
        <div className="w-12 h-12 rounded-full border-4 border-indigo-100 border-t-indigo-500 animate-spin" />
        <p className="text-sm font-bold text-gray-700">계정과 닉네임을 확인하는 중이에요</p>
      </div>
    );
  }
  if (screen === "nickname") return <NicknameScreen error={claimError} onConfirm={enterWithNickname} />;
  return <HomeScreen nickname={nickname} onChangeNickname={handleChangeNickname} />;
}
</script>
